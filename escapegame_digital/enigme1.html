<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.wrapper{
  width:1000px;
  margin:40px auto;
}

.enigme{
  position:relative;
  display:flex;
  line-height:0;
  font-size:0;
}

.partie-gauche,
.partie-droite{
  position:relative;
  height:716px;
}

.partie-gauche img,
.partie-droite img{
  display:block;
  height:716px;
  width:auto;
  border:0;
}

/* MOTS MÊLÉS */

.letter-grid{
  position:absolute;
  left:12.3%;
  top:39.4%;
  width:76.5%;
  height:45.8%;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  line-height:1;
  user-select:none;
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Patrick Hand', cursive;
  font-size:34px;
  font-weight:700;
  color:#1b5f6e;
  cursor:pointer;
  border-radius:12px;
  line-height:1;
  transition:.15s;
}

.cell:hover{ background:rgba(27,95,110,.12); }
.cell.selected{ background:rgba(27,95,110,.28); }
.cell.found{ background:rgba(237,176,26,.75); }

/* CHAMPS DE RÉPONSE */

.reponses{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.reponses input{
  position:absolute;
  pointer-events:auto;
  font-family:'Patrick Hand', cursive;
  font-size:22px;
  font-weight:700;
  text-transform:uppercase;
  background:transparent;
  border:none;
  outline:none;
  color:#111;
  height:34px;
  line-height:34px;
  padding:0 6px;
  transition:.25s;
}

#mot1{ left:150px; top:330px; width:120px; }
#mot2{ left:350px; top:330px; width:120px; }
#mot3{ left:154px; top:370px; width:120px; }
#mot4{ left:200px; top:520px; width:120px; }

.reponses input.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:8px;
  padding:0 10px;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}

.reponses input[readonly],
.reponses input:disabled{
  opacity:1;
  pointer-events:none;
  -webkit-text-fill-color:#ffffff;
}

.reponses input.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:8px;
  padding:0 10px;
}


/* BRAVI DE FIN */

.enigme.gagnee .partie-gauche,
.enigme.gagnee .partie-droite{
  opacity:.5;
  filter:saturate(.5);
  transition:opacity .45s ease, filter .45s ease;
}

.bravi-final{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  z-index:2600;
  transition:opacity .45s ease;
}

.bravi-final.visible{
  opacity:1;
}

.bravi-final img{
  width:50%;
  height:auto;
  display:block;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
}

/* SAC INVENTAIRE */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
  transform:scale(1.08);
}

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:200px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
  width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.inventaire-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{
  list-style:none;
}

.inventaire-content li{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
}

/* LOUPE ÉNIGMES */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;
  height:716px;
  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:250px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;
  height:250px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.navigation-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.navigation-content a{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}

/* BOUTONS */

.panel{
  text-align:center;
  margin-top:30px;
  font-size:17px;
}

.message{
  margin-bottom:18px;
  font-weight:bold;
  color:#ffffff;
}

.btn{
  display:inline-block;
  padding:15px 35px;
  background:#044e61;
  color:#ffffff;
  border-radius:40px;
  font-weight:bold;
  border:none;
  cursor:pointer;
  font-size:17px;
  transition:.2s;
}

.btn:hover{ transform:translateY(-2px); }

/* ANGE DE FIN */

.ange-fin{
  position:fixed;
  left:50%;
  bottom:-360px;
  transform:translateX(-50%);
  width:260px;
  opacity:0;
  transition:all .9s cubic-bezier(.18,.89,.32,1.28);
  z-index:900;
  pointer-events:none;
}

.ange-fin.visible{
  bottom:40px;
  opacity:1;
}

/* FLÈCHE */

.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  width:56px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}

/* ÉCRAN D'ACCÈS */

.acces-overlay{
  position:fixed;
  inset:0;
  z-index:10000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:#1b5f6e;
  transition:opacity .45s ease, visibility .45s ease;
}

.acces-overlay.masque{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.acces-carte{
  width:min(420px, 92vw);
  padding:42px 34px 36px;
  background:#ffffff;
  border-radius:24px;
  text-align:center;
  box-shadow:0 18px 50px rgba(0,0,0,.28);
}

.acces-carte h1{
  margin:0 0 12px;
  font-family:'Patrick Hand', cursive;
  font-size:42px;
  line-height:1;
  color:#044e61;
}

.acces-carte p{
  margin:0 0 24px;
  font-size:16px;
  line-height:1.5;
  color:#345;
}

.acces-carte input{
  width:100%;
  height:54px;
  padding:0 18px;
  border:2px solid #d8e2e5;
  border-radius:14px;
  outline:none;
  text-align:center;
  font-family:'Patrick Hand', cursive;
  font-size:25px;
  letter-spacing:2px;
  color:#044e61;
  background:#f7fafb;
  transition:border-color .2s, box-shadow .2s;
}

.acces-carte input:focus{
  border-color:#1b5f6e;
  box-shadow:0 0 0 4px rgba(27,95,110,.12);
}

.acces-bouton{
  width:100%;
  margin-top:16px;
  padding:15px 24px;
  border:0;
  border-radius:40px;
  background:#044e61;
  color:#ffffff;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  transition:transform .2s, background .2s;
}

.acces-bouton:hover{
  transform:translateY(-2px);
  background:#1b5f6e;
}

.acces-erreur{
  min-height:22px;
  margin-top:14px !important;
  margin-bottom:0 !important;
  color:#c0392b !important;
  font-weight:bold;
}

.acces-carte.secoue{
  animation:secousse .35s ease;
}

@keyframes secousse{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-9px); }
  75%{ transform:translateX(9px); }
}

</style>
</head>

<body>


<div class="acces-overlay" id="accesOverlay">
  <div class="acces-carte" id="accesCarte">
    <h1>Accès à l’escape game</h1>
    <p>Entre le code qui t’a été communiqué pour commencer l’énigme.</p>

    <input
      id="codeAcces"
      type="password"
      inputmode="text"
      autocomplete="off"
      placeholder="Code d’accès"
      aria-label="Code d’accès">

    <button class="acces-bouton" id="boutonAcces" type="button">
      Entrer
    </button>

    <p class="acces-erreur" id="erreurAcces" aria-live="polite"></p>
  </div>
</div>


<audio id="voixInstruction" preload="auto">
    <source src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme1/voix1.mp3" type="audio/mpeg">
</audio>

<div class="wrapper">

  <div class="enigme">

    <div class="inventaire" id="inventaire">
      <div class="inventaire-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png" alt="Inventaire">
      </div>

      <div class="inventaire-content">
        <div class="inventaire-content-inner">
          <h3>Mots trouvés</h3>
          <ul id="listeMots"></ul>
        </div>
      </div>
    </div>

    <div class="navigation-enigmes" id="navigationEnigmes">
      <div class="navigation-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png" alt="Énigmes">
      </div>

      <div class="navigation-content">
        <div class="navigation-content-inner">
          <h3>Énigmes</h3>
          <a href="enigme1.html">Énigme 1</a>
          <a href="enigme2.html">Énigme 2</a>
          <a href="enigme3.html">Énigme 3</a>
          <a href="enigme4.html">Énigme 4</a>
          <a href="enigme5.html">Énigme 5</a>
        </div>
      </div>
    </div>

    <div class="bravi-final" id="braviFinal">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/bravi1.png" alt="Bravo énigme 1">
    </div>

    <div class="partie-gauche">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme1/1A.jpg" alt="Mots mêlés">
      <div class="letter-grid" id="letterGrid"></div>
    </div>

    <div class="partie-droite">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme1/1B.jpg" alt="Réponses">

      <div class="reponses">
        <input id="mot1" type="text" autocomplete="off" maxlength="8">
        <input id="mot2" type="text" autocomplete="off" maxlength="11">
        <input id="mot3" type="text" autocomplete="off" maxlength="9">
        <input id="mot4" type="text" autocomplete="off" maxlength="10">
      </div>
    </div>

  </div>

</div>

<img
  id="angeFin"
  class="ange-fin"
  src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme1/ange1.png"
  alt="Bravo">

<a href="enigme2.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
const letters = [
  "DNUOHIPBNM",
  "WPHYSIQUEM",
  "PVEYEVLPGA",
  "SEBRXIELLI",
  "ZMZIUTGZIL",
  "EPILEVAYGL",
  "FROWLALGEO",
  "JIEPLRPGNT",
  "FSSEENACCV",
  "PEVOACNVEI"
];

const hiddenWords = [
  "PHYSIQUE",
  "SEXUELLE",
  "NEGLIGENCE",
  "EMPRISE"
];

const solutions = {
  mot1: ["PHYSIQUE"],
  mot2: ["NEGLIGENCE"],
  mot3: ["SEXUELLE"],
  mot4: ["EMPRISE", "LEMPRISE"]
};

const grid = document.getElementById("letterGrid");
const nextBtn = document.getElementById("nextBtn");
const angeFin = document.getElementById("angeFin");
const braviFinal = document.getElementById("braviFinal");

let isSelecting = false;
let selectedCells = [];
let jeuTermine = false;

afficherMotsTrouves();

letters.forEach((row, r) => {
  [...row].forEach((letter, c) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = letter;
    cell.dataset.r = r;
    cell.dataset.c = c;

    cell.addEventListener("mousedown", () => startSelection(cell));
    cell.addEventListener("mouseenter", () => continueSelection(cell));

    grid.appendChild(cell);
  });
});

document.addEventListener("mouseup", endSelection);


document.querySelectorAll(".reponses input").forEach(input => {
  input.addEventListener("input", () => {
    input.value = input.value.toUpperCase();
    input.classList.remove("erreur");

    const valeur = nettoyerTexte(input.value);

    if(solutions[input.id] && solutions[input.id].includes(valeur)){
      verrouillerMot(input);
    }
  });
});

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Z]/g, "");
}

function verrouillerMot(input){
  input.classList.remove("erreur");
  input.classList.add("ok");
  input.readOnly = true;
  input.setAttribute("readonly", "readonly");
  input.blur();
  verifierFin();
}

function verifierFin(){
  if(jeuTermine) return;

  const totalValides = document.querySelectorAll(".reponses input.ok").length;
  const totalSolutions = Object.keys(solutions).length;

  if(totalValides !== totalSolutions) return;

  jeuTermine = true;


  document.querySelector(".enigme").classList.add("gagnee");
  ajouterMotTrouve("Énigme 1", "PROTÉGEONS");
  braviFinal.classList.add("visible");

  setTimeout(() => {
    nextBtn.classList.add("visible");
  }, 1000);
}

function startSelection(cell){
  clearSelection();
  isSelecting = true;
  addCell(cell);
}

function continueSelection(cell){
  if(isSelecting){
    addCell(cell);
  }
}

function addCell(cell){
  if(selectedCells.includes(cell)) return;

  selectedCells.push(cell);
  cell.classList.add("selected");
}

function endSelection(){
  if(!isSelecting) return;

  isSelecting = false;

  const word = selectedCells.map(cell => cell.textContent).join("");
  const reversed = word.split("").reverse().join("");

  if(hiddenWords.includes(word) || hiddenWords.includes(reversed)){
    selectedCells.forEach(cell => {
      cell.classList.remove("selected");
      cell.classList.add("found");
    });

  } else {
    clearSelection();
  }

  selectedCells = [];
}

function clearSelection(){
  document.querySelectorAll(".cell.selected").forEach(cell => {
    cell.classList.remove("selected");
  });
}

function ajouterMotTrouve(enigme, mot){
  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];

  if(!mots.some(item => item.enigme === enigme)){
    mots.push({ enigme, mot });
    localStorage.setItem("motsEscapeRebond", JSON.stringify(mots));
  }

  afficherMotsTrouves();
}

function afficherMotsTrouves(){
  const liste = document.getElementById("listeMots");
  if(!liste) return;

  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];

  liste.innerHTML = "";

  if(mots.length === 0){
    liste.innerHTML = "<li>Aucun mot</li>";
    return;
  }

  mots.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.enigme + " : " + item.mot;
    liste.appendChild(li);
  });
}
  /* ===========================
   ACCÈS PROTÉGÉ ET VOIX
=========================== */

const CODE_ACCES = "REBOND2026"; // Modifie le code ici

const accesOverlay = document.getElementById("accesOverlay");
const accesCarte = document.getElementById("accesCarte");
const codeAcces = document.getElementById("codeAcces");
const boutonAcces = document.getElementById("boutonAcces");
const erreurAcces = document.getElementById("erreurAcces");
const voixInstruction = document.getElementById("voixInstruction");

function ouvrirEscapeGame(){
  const codeSaisi = codeAcces.value.trim().toUpperCase();

  if(codeSaisi !== CODE_ACCES.toUpperCase()){
    erreurAcces.textContent = "Code incorrect. Essaie encore.";
    codeAcces.value = "";
    codeAcces.focus();

    accesCarte.classList.remove("secoue");
    void accesCarte.offsetWidth;
    accesCarte.classList.add("secoue");
    return;
  }

  erreurAcces.textContent = "";
  accesOverlay.classList.add("masque");

  setTimeout(() => {
    accesOverlay.remove();
  }, 500);

  setTimeout(() => {
    voixInstruction.currentTime = 0;
    voixInstruction.play().catch(() => {
      console.log("La lecture audio a été bloquée par le navigateur.");
    });
  }, 2000);
}

boutonAcces.addEventListener("click", ouvrirEscapeGame);

codeAcces.addEventListener("keydown", (event) => {
  if(event.key === "Enter"){
    ouvrirEscapeGame();
  }
});

window.addEventListener("load", () => {
  codeAcces.focus();
});
</script>

</body>
</html>
