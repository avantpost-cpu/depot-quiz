<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme2{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.zone-enigme2{
  position:relative;
  height:716px;
  line-height:0;
  font-size:0;
}

.animation-2{
  display:block;
  height:716px;
  width:auto;
  border:0;
}

/* ZONES CLIQUABLES */

.phrase{
  position:absolute;
  background:transparent;
  border:0;
  cursor:pointer;
  border-radius:18px;
  transition:.25s;
}

.phrase.active{
  border:4px solid #18A558;
  background:rgba(24,165,88,.12);
}

.phrase.grisee{
  background:rgba(120,120,120,.55);
  cursor:default;
}

.phrase[data-id="1"]{ left:62px; top:239px; width:254px; height:55px; }
.phrase[data-id="2"]{ left:63px; top:311px; width:257px; height:98px; }
.phrase[data-id="3"]{ left:62px; top:424px; width:257px; height:58px; }
.phrase[data-id="4"]{ left:64px; top:499px; width:258px; height:43px; }
.phrase[data-id="5"]{ left:698px; top:236px; width:255px; height:101px; }
.phrase[data-id="6"]{ left:698px; top:353px; width:233px; height:80px; }
.phrase[data-id="7"]{ left:699px; top:447px; width:230px; height:118px; }

/* MOT-CLÉ */

#motCle{
  position:absolute;
  left:333px;
  top:597px;
  width:345px;
  height:60px;
  font-family:'Patrick Hand', cursive;
  font-size:42px;
  font-weight:700;
  letter-spacing:6px;
  text-align:center;
  text-transform:uppercase;
  background:transparent;
  border:0;
  outline:none;
  color:#111;
}

#motCle.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:10px;
  letter-spacing:2px;
}

#motCle[readonly]{
  pointer-events:none;
  -webkit-text-fill-color:#ffffff;
}

#motCle.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:10px;
}


/* BRAVI DE FIN */

.zone-enigme2.gagnee .animation-2,
.zone-enigme2.gagnee .phrase,
.zone-enigme2.gagnee #motCle{
  opacity:.5;
  filter:saturate(.5);
  transition:opacity .45s ease, filter .45s ease;
}

.bravi-final{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  z-index:2600;
  transition:opacity .45s ease;
}

.bravi-final.visible{
  opacity:1;
}

.bravi-final img{
  width:50%;
  height:auto;
  display:block;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
}

/* ONGLET SAC */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
  transform:scale(1.08);
}

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:200px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
  width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.inventaire-content h3,
.navigation-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{
  list-style:none;
}

.inventaire-content li{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
}

/* ONGLET LOUPE */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;
  height:716px;
  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:250px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;
  height:250px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.navigation-content a{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}

/* PANEL */

.panel{
  text-align:center;
  margin-top:30px;
  font-size:17px;
}

.message{
  margin-bottom:18px;
  font-weight:bold;
  color:#ffffff;
}

.btn{
  display:inline-block;
  padding:15px 35px;
  background:#044e61;
  color:#ffffff;
  border:none;
  border-radius:40px;
  font-weight:bold;
  cursor:pointer;
  font-size:17px;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* ANGE DE FIN */

.ange-fin{
  position:fixed;
  left:32%;
  bottom:-300px;
  transform:translateX(-50%);
  width:200px;
  opacity:0;
  transition:all .9s cubic-bezier(.18,.89,.32,1.28);
  z-index:900;
  pointer-events:none;
}

.ange-fin.visible{
  bottom:40px;
  opacity:1;
}

/* FLÈCHE */

.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}
</style>
</head>

<body>

<div class="page-enigme2">

  <div class="zone-enigme2">

    <div class="inventaire" id="inventaire">
      <div class="inventaire-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png" alt="Inventaire">
      </div>

      <div class="inventaire-content">
        <div class="inventaire-content-inner">
          <h3>Mots trouvés</h3>
          <ul id="listeMots"></ul>
        </div>
      </div>
    </div>

    <div class="navigation-enigmes" id="navigationEnigmes">
      <div class="navigation-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png" alt="Énigmes">
      </div>

      <div class="navigation-content">
        <div class="navigation-content-inner">
          <h3>Énigmes</h3>
          <a href="enigme1.html">Énigme 1</a>
          <a href="enigme2.html">Énigme 2</a>
          <a href="enigme3.html">Énigme 3</a>
          <a href="enigme4.html">Énigme 4</a>
          <a href="enigme5.html">Énigme 5</a>
        </div>
      </div>
    </div>

    <div class="bravi-final" id="braviFinal">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/bravi2.png" alt="Bravo énigme 2">
    </div>

    <video
      class="animation-2"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme2/enigme2.mp4"
      autoplay
      muted
      playsinline>
    </video>

    <button class="phrase bonne" data-id="1" type="button"></button>
    <button class="phrase mauvaise" data-id="2" type="button"></button>
    <button class="phrase bonne" data-id="3" type="button"></button>
    <button class="phrase mauvaise" data-id="4" type="button"></button>
    <button class="phrase mauvaise" data-id="5" type="button"></button>
    <button class="phrase mauvaise" data-id="6" type="button"></button>
    <button class="phrase bonne" data-id="7" type="button"></button>

    <input id="motCle" type="text" autocomplete="off" maxlength="12">

  </div>


</div>

<img
  id="angeFin"
  class="ange-fin"
  src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme2/ange2.png"
  alt="Bravo">

<a href="enigme3.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
const bonnesPhrases = ["1", "3", "7"];
const selectionnees = new Set();

const phrases = document.querySelectorAll(".phrase");
const message = document.getElementById("message");
const motCle = document.getElementById("motCle");
const validateBtn = document.getElementById("validateBtn");
const nextBtn = document.getElementById("nextBtn");
const angeFin = document.getElementById("angeFin");
const braviFinal = document.getElementById("braviFinal");

let jeuTermine = false;

afficherMotsTrouves();

phrases.forEach(phrase => {
  phrase.addEventListener("click", () => {
    const id = phrase.dataset.id;

    if(phrase.disabled) return;

    if(!bonnesPhrases.includes(id)){
      phrase.classList.add("grisee");
      phrase.disabled = true;
      if(message){ message.textContent = "Cette phrase n’est pas une situation à retenir."; }
      return;
    }

    phrase.classList.add("active");
    phrase.disabled = true;
    selectionnees.add(id);

    if(selectionnees.size === bonnesPhrases.length){
      griserMauvaises();
      if(message){ message.textContent = "Bravo ! Les bonnes situations sont entourées. Trouve maintenant le mot-clé."; }
    }
  });
});

function griserMauvaises(){
  phrases.forEach(phrase => {
    if(!bonnesPhrases.includes(phrase.dataset.id)){
      phrase.classList.add("grisee");
      phrase.disabled = true;
    }
  });
}

motCle.addEventListener("input", () => {
  motCle.value = motCle.value.toUpperCase();
  motCle.classList.remove("erreur");

  if(nettoyerTexte(motCle.value) === "CONSENTEMENT"){
    validerMot();
  }
});

if(validateBtn){
  validateBtn.addEventListener("click", () => {
    if(nettoyerTexte(motCle.value) === "CONSENTEMENT"){
      validerMot();
    } else {
      motCle.classList.add("erreur");
      if(message){ message.textContent = "Le mot-clé n’est pas encore correct."; }
    }
  });
}

function validerMot(){
  if(jeuTermine) return;

  jeuTermine = true;

  motCle.classList.remove("erreur");
  motCle.classList.add("ok");
  motCle.readOnly = true;

  ajouterMotTrouve("Énigme 2", "LE SPORT");

  document.querySelector(".zone-enigme2").classList.add("gagnee");
  braviFinal.classList.add("visible");

  if(validateBtn){ validateBtn.style.display = "none"; }

  setTimeout(() => {
    nextBtn.classList.add("visible");
  }, 1000);
}

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Z]/g, "");
}

function ajouterMotTrouve(enigme, mot){
  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];

  if(!mots.some(item => item.enigme === enigme)){
    mots.push({ enigme, mot });
    localStorage.setItem("motsEscapeRebond", JSON.stringify(mots));
  }

  afficherMotsTrouves();
}

function afficherMotsTrouves(){
  const liste = document.getElementById("listeMots");
  if(!liste) return;

  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];

  liste.innerHTML = "";

  if(mots.length === 0){
    liste.innerHTML = "<li>Aucun mot</li>";
    return;
  }

  mots.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.enigme + " : " + item.mot;
    liste.appendChild(li);
  });
}
</script>

</body>
</html>
