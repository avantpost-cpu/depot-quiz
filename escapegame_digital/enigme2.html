<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme2{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.zone-enigme2{
  position:relative;
  height:716px;
  line-height:0;
  font-size:0;
}

.zone-enigme2 img{
  display:block;
  height:716px;
  width:auto;
  border:0;
}

/* ZONES CLIQUABLES */

.phrase{
  position:absolute;
  background:transparent;
  border:0;
  cursor:pointer;
  border-radius:18px;
  transition:.25s;
}

.phrase.active{
  border:4px solid #18A558;
  background:rgba(24,165,88,.12);
}

.phrase.grisee{
  background:rgba(120,120,120,.55);
  cursor:default;
}

/* Coordonnées phrases */

.phrase[data-id="1"]{
  left:62px;
  top:239px;
  width:254px;
  height:55px;
}

.phrase[data-id="2"]{
  left:63px;
  top:311px;
  width:257px;
  height:98px;
}

.phrase[data-id="3"]{
  left:62px;
  top:424px;
  width:257px;
  height:58px;
}

.phrase[data-id="4"]{
  left:64px;
  top:499px;
  width:258px;
  height:43px;
}

.phrase[data-id="5"]{
  left:698px;
  top:236px;
  width:255px;
  height:101px;
}

.phrase[data-id="6"]{
  left:698px;
  top:353px;
  width:233px;
  height:80px;
}

.phrase[data-id="7"]{
  left:699px;
  top:447px;
  width:230px;
  height:118px;
}

/* MOT-CLÉ */

#motCle{
  position:absolute;
  left:333px;
  top:597px;
  width:345px;
  height:60px;

  font-family:'Patrick Hand', cursive;
  font-size:42px;
  font-weight:700;
  letter-spacing:6px;
  text-align:center;
  text-transform:uppercase;

  background:transparent;
  border:0;
  outline:none;
  color:#111;
}

#motCle.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:10px;
  letter-spacing:2px;
}

#motCle[readonly]{
  pointer-events:none;
  -webkit-text-fill-color:#ffffff;
}

#motCle.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:10px;
}

/* PANEL */

.panel{
  text-align:center;
  margin-top:30px;
  font-size:17px;
}

.message{
  margin-bottom:18px;
  font-weight:bold;
  color:#ffffff;
}

.btn{
  display:inline-block;
  padding:15px 35px;
  background:#044e61;
  color:#ffffff;
  border:none;
  border-radius:40px;
  font-weight:bold;
  cursor:pointer;
  font-size:17px;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* FLÈCHE */

.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}
</style>
</head>

<body>

<div class="page-enigme2">

  <div class="zone-enigme2">

    <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme2/enigme2.jpg" alt="Énigme 2">

    <button class="phrase bonne" data-id="1" type="button"></button>
    <button class="phrase mauvaise" data-id="2" type="button"></button>
    <button class="phrase bonne" data-id="3" type="button"></button>
    <button class="phrase mauvaise" data-id="4" type="button"></button>
    <button class="phrase mauvaise" data-id="5" type="button"></button>
    <button class="phrase mauvaise" data-id="6" type="button"></button>
    <button class="phrase bonne" data-id="7" type="button"></button>

    <input id="motCle" type="text" autocomplete="off" maxlength="12">

  </div>

  <div class="panel">
    <div class="message" id="message">Entoure les situations sans risque, puis trouve le mot-clé.</div>
    <button class="btn" id="validateBtn" type="button">Valider</button>
  </div>

</div>

<a href="enigme3.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
const bonnesPhrases = ["1", "3", "7"];
const selectionnees = new Set();

const phrases = document.querySelectorAll(".phrase");
const message = document.getElementById("message");
const motCle = document.getElementById("motCle");
const validateBtn = document.getElementById("validateBtn");
const nextBtn = document.getElementById("nextBtn");

phrases.forEach(phrase => {
  phrase.addEventListener("click", () => {
    const id = phrase.dataset.id;

    if(phrase.disabled) return;

    if(!bonnesPhrases.includes(id)){
      phrase.classList.add("grisee");
      phrase.disabled = true;
      message.textContent = "Cette phrase n’est pas une situation à retenir.";
      return;
    }

    phrase.classList.add("active");
    phrase.disabled = true;
    selectionnees.add(id);

    if(selectionnees.size === bonnesPhrases.length){
      griserMauvaises();
      message.textContent = "Bravo ! Les bonnes situations sont entourées. Trouve maintenant le mot-clé.";
    }
  });
});

function griserMauvaises(){
  phrases.forEach(phrase => {
    if(!bonnesPhrases.includes(phrase.dataset.id)){
      phrase.classList.add("grisee");
      phrase.disabled = true;
    }
  });
}

motCle.addEventListener("input", () => {
  motCle.value = motCle.value.toUpperCase();
  motCle.classList.remove("erreur");

  if(nettoyerTexte(motCle.value) === "CONSENTEMENT"){
    validerMot();
  }
});

validateBtn.addEventListener("click", () => {
  if(nettoyerTexte(motCle.value) === "CONSENTEMENT"){
    validerMot();
  } else {
    motCle.classList.add("erreur");
    message.textContent = "Le mot-clé n’est pas encore correct.";
  }
});

function validerMot(){
  motCle.classList.remove("erreur");
  motCle.classList.add("ok");
  motCle.readOnly = true;

  message.textContent = "Bravo ! Tu peux passer à l’énigme suivante.";
  validateBtn.style.display = "none";
  nextBtn.classList.add("visible");
}

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Z]/g, "");
}
</script>

</body>
</html>
