<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme3{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-enigme3{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:716px;
  line-height:0;
  font-size:0;
}

.partie-3a,
.partie-3b{
  position:relative;
  height:716px;
}

.partie-3a img,
.animation-3b{
  display:block;
  height:716px;
  width:auto;
  border:0;
}

.reponse-corps{
  position:absolute;
  font-family:'Patrick Hand', cursive;
  font-size:24px;
  font-weight:700;
  text-transform:uppercase;
  background:transparent;
  border:none;
  outline:none;
  color:#111;
  height:34px;
  line-height:34px;
  padding:0 8px;
}

#mot1{ left:112px; top:370px; width:100px; }
#mot2{ left:254px; top:370px; width:100px; }
#mot3{ left:116px; top:450px; width:100px; }
#mot4{ left:254px; top:450px; width:100px; }
#mot5{ left:116px; top:533px; width:155px; }

.reponse-corps.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:8px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}

#mot5.ok{ width:95px; }

.reponse-corps[readonly]{
  pointer-events:none;
  -webkit-text-fill-color:#ffffff;
}

.reponse-corps.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:8px;
}

.badges-panel{
  display:none;
  gap:14px;
  justify-content:center;
  align-items:center;
  margin-top:22px;
  min-height:70px;
}

.badges-panel.visible{
  display:flex;
}

.badge{
  width:58px;
  height:auto;
  cursor:grab;
  user-select:none;
  touch-action:none;
  z-index:1000;
}

.badge.dragging{
  cursor:grabbing;
  transform:scale(1.08);
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));
}

.badge.place{
  cursor:grab;
}

.panel{
  text-align:center;
  margin-top:30px;
  font-size:17px;
}

.message{
  margin-bottom:18px;
  font-weight:bold;
  color:#ffffff;
}

.btn{
  display:inline-block;
  padding:15px 35px;
  background:#044e61;
  color:#ffffff;
  border:none;
  border-radius:40px;
  font-weight:bold;
  cursor:pointer;
  font-size:17px;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* ONGLET INVENTAIRE */

/* Sac */

.inventaire{
    position:absolute;
    left:-70px;
    top:0;
    height:716px;
    z-index:3000;
}

.inventaire-tab{
    position:absolute;
    left:0;
    top:25px;
    width:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.inventaire-tab img{
    width:80px;
    height:auto;
    transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
    transform:scale(1.08);
}

/* Tiroir */

.inventaire-content{
    position:absolute;
    left:70px;
    top:10px;

    width:0;
    height:200px;

    overflow:hidden;

background:rgba(255,255,255,.30);   /* blanc à 30 % */
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

color:#044e61;

    transition:width .35s ease;

    border-radius:0 18px 18px 0;

    box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
    width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.inventaire-content h3{
    font-size:18px;
    margin-bottom:18px;
    color:#044e61;
}

.inventaire-content ul{
    list-style:none;
}

.inventaire-content li{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
}


/* ONGLET LOUPE */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;
  height:716px;
  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:250px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;
  height:250px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.navigation-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.navigation-content a{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}


.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}
</style>
</head>

<body>

<div class="page-enigme3">

  <div class="bloc-enigme3">

    <div class="inventaire" id="inventaire">
      <div class="inventaire-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png" alt="Inventaire">
      </div>

      <div class="inventaire-content">
        <div class="inventaire-content-inner">
          <h3>Mots trouvés</h3>
          <ul id="listeMots"></ul>
        </div>
      </div>
    </div>

    <div class="navigation-enigmes" id="navigationEnigmes">
      <div class="navigation-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png" alt="Énigmes">
      </div>

      <div class="navigation-content">
        <div class="navigation-content-inner">
          <h3>Énigmes</h3>
          <a href="enigme1.html">Énigme 1</a>
          <a href="enigme2.html">Énigme 2</a>
          <a href="enigme3.html">Énigme 3</a>
          <a href="enigme4.html">Énigme 4</a>
          <a href="enigme5.html">Énigme 5</a>
        </div>
      </div>
    </div>

    <div class="partie-3a">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/3A.jpg" alt="Énigme 3">

      <input id="mot1" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot2" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot3" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot4" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot5" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
    </div>

    <div class="partie-3b" id="zoneImage">
      <video
        class="animation-3b"
        src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/3B.mp4"
        autoplay
        muted
        playsinline>
      </video>
    </div>

  </div>

  <div class="badges-panel" id="badgesPanel">
    <img id="b1" class="badge" data-word="FESSES" src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/b1.png" alt="">
    <img id="b2" class="badge" data-word="SEXE" src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/b2.png" alt="">
    <img id="b3" class="badge" data-word="BOUCHE" src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/b3.png" alt="">
    <img id="b4" class="badge" data-word="SEINS" src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/b4.png" alt="">
    <img id="b5" class="badge" data-word="ENTREJAMBE" src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/b5.png" alt="">
  </div>

  <div class="panel">
    <div class="message" id="message">Écris les cinq mots dans n’importe quel ordre.</div>
    <button class="btn" id="validateBtn">Valider</button>
  </div>

</div>

<a href="enigme4.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
const motsPossibles = [
  "FESSES",
  "SEXE",
  "BOUCHE",
  "SEINS",
  "POITRINE",
  "ENTREJAMBE"
];

const motsCanoniques = {
  FESSES:"FESSES",
  SEXE:"SEXE",
  BOUCHE:"BOUCHE",
  SEINS:"SEINS",
  POITRINE:"SEINS",
  ENTREJAMBE:"ENTREJAMBE"
};

const motsTrouves = new Set();
const badgesPlaces = new Set();

const message = document.getElementById("message");
const validateBtn = document.getElementById("validateBtn");
const nextBtn = document.getElementById("nextBtn");
const zoneImage = document.getElementById("zoneImage");
const badgesPanel = document.getElementById("badgesPanel");
const inputs = document.querySelectorAll(".reponse-corps");

let badgeActif = null;
let offsetX = 0;
let offsetY = 0;

afficherMotsTrouves();

inputs.forEach(input => {
  input.addEventListener("input", () => {
    input.value = input.value.toUpperCase();
    input.classList.remove("erreur");

    const valeur = nettoyerTexte(input.value);

    if(motsPossibles.includes(valeur)){
      const canonique = motsCanoniques[valeur];

      if(!motsTrouves.has(canonique)){
        verrouillerMot(input, canonique);
      }
    }
  });
});

if(validateBtn){ validateBtn.addEventListener("click", verifierReponses); }

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Z]/g,"");
}

function verrouillerMot(input, mot){
  input.classList.add("ok");
  input.readOnly = true;
  input.value = mot;
  input.blur();

  motsTrouves.add(mot);
  verifierMots();
}

function verifierReponses(){
  let erreur = false;

  inputs.forEach(input => {
    if(input.classList.contains("ok")) return;

    const valeur = nettoyerTexte(input.value);

    if(motsPossibles.includes(valeur)){
      const canonique = motsCanoniques[valeur];

      if(!motsTrouves.has(canonique)){
        verrouillerMot(input, canonique);
      } else {
        input.classList.add("erreur");
        erreur = true;
      }
    } else {
      input.classList.add("erreur");
      erreur = true;
    }
  });

  if(erreur){
    message.textContent = "Il manque encore un mot ou un mot est déjà utilisé.";
  }

  verifierMots();
}

function verifierMots(){
  if(motsTrouves.size === 5){
    message.textContent = "Bravo ! Prends un numéro et pose-le sur l’image.";
    if(validateBtn){ validateBtn.style.display = "none"; }
    badgesPanel.classList.add("visible");
  }
}

document.querySelectorAll(".badge").forEach(badge => {
  badge.addEventListener("mousedown", commencerDrag);
});

function commencerDrag(e){
  e.preventDefault();

  badgeActif = e.currentTarget;

  const rect = badgeActif.getBoundingClientRect();

  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  badgeActif.classList.add("dragging");

  document.body.appendChild(badgeActif);

  badgeActif.style.position = "fixed";
  badgeActif.style.left = rect.left + "px";
  badgeActif.style.top = rect.top + "px";
  badgeActif.style.zIndex = "9999";
}

document.addEventListener("mousemove", e => {
  if(!badgeActif) return;

  badgeActif.style.left = (e.clientX - offsetX) + "px";
  badgeActif.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", e => {
  if(!badgeActif) return;

  const imageRect = zoneImage.getBoundingClientRect();

  const x = e.clientX - imageRect.left;
  const y = e.clientY - imageRect.top;

  if(
    x >= 0 &&
    x <= imageRect.width &&
    y >= 0 &&
    y <= imageRect.height
  ){
    zoneImage.appendChild(badgeActif);

    badgeActif.style.position = "absolute";
    badgeActif.style.left = (x - offsetX) + "px";
    badgeActif.style.top = (y - offsetY) + "px";
    badgeActif.style.zIndex = "80";

    badgeActif.classList.remove("dragging");
    badgeActif.classList.add("place");

    badgesPlaces.add(badgeActif.id);

    if(badgesPlaces.size === 5){
      message.textContent = "Bravo ! Tu peux passer à l’énigme suivante.";

      /* Si l’énigme 3 donne un mot final, remplace "MOT_ÉNIGME_3" par le bon mot */
      /* ajouterMotTrouve("Énigme 3", "MOT_ÉNIGME_3"); */

      nextBtn.classList.add("visible");
    }

  } else {
    badgesPanel.appendChild(badgeActif);

    badgeActif.style.position = "";
    badgeActif.style.left = "";
    badgeActif.style.top = "";
    badgeActif.style.zIndex = "";

    badgeActif.classList.remove("dragging");
  }

  badgeActif = null;
});

/* MÉMOIRE DES MOTS TROUVÉS */

function ajouterMotTrouve(enigme, mot){
  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];
  const existeDeja = mots.some(item => item.enigme === enigme);

  if(!existeDeja){
    mots.push({ enigme, mot });
    localStorage.setItem("motsEscapeRebond", JSON.stringify(mots));
  }

  afficherMotsTrouves();
}

function afficherMotsTrouves(){
  const liste = document.getElementById("listeMots");
  if(!liste) return;

  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];
  liste.innerHTML = "";

  if(mots.length === 0){
    const li = document.createElement("li");
    li.textContent = "Aucun mot";
    liste.appendChild(li);
    return;
  }

  mots.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.enigme + " : " + item.mot;
    liste.appendChild(li);
  });
}
</script>

</body>
</html>
