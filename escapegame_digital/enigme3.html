<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme3{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-enigme3{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:716px;
  line-height:0;
  font-size:0;
}

.partie-3a,
.partie-3b{
  position:relative;
  height:716px;
}

.partie-3a img,
.animation-3b{
  display:block;
  height:716px;
  width:auto;
  border:0;
}

/* CHAMPS */

.reponse-corps{
  position:absolute;
  font-family:'Patrick Hand', cursive;
  font-size:24px;
  font-weight:700;
  text-transform:uppercase;
  background:transparent;
  border:none;
  outline:none;
  color:#111;
  height:34px;
  line-height:34px;
  padding:0 8px;
}

#mot1{ left:112px; top:370px; width:100px; }
#mot2{ left:254px; top:370px; width:130px; }
#mot3{ left:116px; top:450px; width:100px; }
#mot4{ left:254px; top:450px; width:100px; }
#mot5{ left:116px; top:533px; width:155px; }

.reponse-corps.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:8px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}

#mot2.ok{ width:130px; }
#mot5.ok{ width:155px; }

.reponse-corps[readonly]{
  pointer-events:none;
  -webkit-text-fill-color:#ffffff;
}

.reponse-corps.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:8px;
}

/* CHIFFRES */

.badges-panel{
  display:none;
  position:absolute;
  left:55px;
  top:642px;
  width:545px;
  gap:14px;
  justify-content:center;
  align-items:center;
  z-index:200;
}

.badges-panel.visible{ display:flex; }

.badge{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#bf4b22;
  color:#ffffff;
  font-family:Arial, Helvetica, sans-serif;
  font-size:28px;
  line-height:48px;
  font-weight:900;
  text-align:center;
  cursor:grab;
  user-select:none;
  touch-action:none;
  box-shadow:0 4px 10px rgba(0,0,0,.28);
}

.badge.dragging{
  cursor:grabbing;
  transform:scale(1.08);
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));
}

.badge.ok{
  background:#18A558;
  color:#ffffff;
  cursor:default;
}

/* Debug visuel des zones calculées */
.debug-zone{
  position:absolute;
  display:none;
  z-index:160;
  background:rgba(191,75,34,.18);
  outline:3px solid rgba(191,75,34,.75);
  border-radius:18px;
  pointer-events:none;
}

body.debug .debug-zone{
  display:block;
}


/* BRAVI DE FIN */

.bloc-enigme3.gagnee .partie-3a,
.bloc-enigme3.gagnee .partie-3b{
  opacity:.5;
  filter:saturate(.5);
  transition:opacity .45s ease, filter .45s ease;
}

.bravi-final{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  z-index:2600;
  transition:opacity .45s ease;
}

.bravi-final.visible{
  opacity:1;
}

.bravi-final img{
  width:50%;
  height:auto;
  display:block;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
}

/* SAC */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{ transform:scale(1.08); }

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:200px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{ width:230px; }

.inventaire-content-inner{
  width:230px;
  height:200px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.inventaire-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{ list-style:none; }

.inventaire-content li{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
}

/* LOUPE */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;
  height:716px;
  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{ transform:scale(1.08); }

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:250px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{ width:230px; }

.navigation-content-inner{
  width:230px;
  height:250px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.navigation-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.navigation-content a{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}

/* FLÈCHE */

.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}
</style>
</head>

<body>

<div class="page-enigme3">

  <div class="bloc-enigme3">

    <div class="inventaire" id="inventaire">
      <div class="inventaire-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png" alt="Inventaire">
      </div>

      <div class="inventaire-content">
        <div class="inventaire-content-inner">
          <h3>Mots trouvés</h3>
          <ul id="listeMots"></ul>
        </div>
      </div>
    </div>

    <div class="navigation-enigmes" id="navigationEnigmes">
      <div class="navigation-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png" alt="Énigmes">
      </div>

      <div class="navigation-content">
        <div class="navigation-content-inner">
          <h3>Énigmes</h3>
          <a href="enigme1.html">Énigme 1</a>
          <a href="enigme2.html">Énigme 2</a>
          <a href="enigme3.html">Énigme 3</a>
          <a href="enigme4.html">Énigme 4</a>
          <a href="enigme5.html">Énigme 5</a>
        </div>
      </div>
    </div>

    <div class="bravi-final" id="braviFinal">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/bravi3.png" alt="Bravo énigme 3">
    </div>

    <div class="partie-3a">
      <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/3A.jpg" alt="Énigme 3">

      <input id="mot1" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot2" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot3" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot4" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
      <input id="mot5" class="reponse-corps" type="text" autocomplete="off" maxlength="14">
    </div>

    <div class="partie-3b" id="zoneImage">
      <video
        class="animation-3b"
        src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme3/3B.mp4"
        autoplay
        muted
        playsinline>
      </video>

      <div class="badges-panel" id="badgesPanel"></div>
      <div id="debugZones"></div>
    </div>

  </div>

</div>

<a href="enigme4.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
/*
  Active le mode debug en mettant true,
  ou en ajoutant ?debug=1 à l'URL.
*/
const DEBUG_ZONES = false;

if(DEBUG_ZONES || new URLSearchParams(window.location.search).get("debug") === "1"){
  document.body.classList.add("debug");
}

const motsPossibles = [
  "FESSES",
  "SEXE",
  "BOUCHE",
  "SEINS",
  "POITRINE",
  "ENTREJAMBE"
];

const motsCanoniques = {
  FESSES:"FESSES",
  SEXE:"SEXE",
  BOUCHE:"BOUCHE",
  SEINS:"SEINS",
  POITRINE:"SEINS",
  ENTREJAMBE:"ENTREJAMBE"
};

const zonesDepot = [
  /* GARÇON */
  { mot:"BOUCHE",      x:30,  y:235, w:155, h:75  },
  { mot:"SEINS",       x:30,  y:288, w:155, h:95  },
  { mot:"SEXE",        x:30,  y:365, w:150, h:90  },
  { mot:"ENTREJAMBE",  x:28,  y:405, w:160, h:115 },

  /* FILLE */
  { mot:"BOUCHE",      x:180, y:235, w:175, h:75  },
  { mot:"SEINS",       x:180, y:290, w:170, h:95  },
  { mot:"SEXE",        x:180, y:355, w:165, h:90  },
  { mot:"ENTREJAMBE",  x:180, y:385, w:175, h:115 },

  /* DOS */
  { mot:"FESSES",      x:334, y:330, w:205, h:155 }
];

const motsTrouves = new Set();
const motsParCase = {};
const badgesPlaces = new Set();

const nextBtn = document.getElementById("nextBtn");
const zoneImage = document.getElementById("zoneImage");
const badgesPanel = document.getElementById("badgesPanel");
const debugZones = document.getElementById("debugZones");
const inputs = document.querySelectorAll(".reponse-corps");
const braviFinal = document.getElementById("braviFinal");

let badgeActif = null;
let offsetX = 0;
let offsetY = 0;

afficherMotsTrouves();
creerZonesDebug();

inputs.forEach(input => {
  input.addEventListener("input", () => {
    input.value = input.value.toUpperCase();
    input.classList.remove("erreur");

    const valeur = nettoyerTexte(input.value);

    if(motsPossibles.includes(valeur)){
      const canonique = motsCanoniques[valeur];

      if(!motsTrouves.has(canonique)){
        verrouillerMot(input, canonique);
      }
    }
  });
});

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Z]/g,"");
}

function verrouillerMot(input, mot){
  input.classList.add("ok");
  input.readOnly = true;
  input.value = mot;
  input.blur();

  motsTrouves.add(mot);
  motsParCase[input.id] = mot;

  verifierMots();
}

function verifierMots(){
  if(motsTrouves.size === 5){
    creerChiffresSelonReponses();
    badgesPanel.classList.add("visible");
  }
}

function creerChiffresSelonReponses(){
  badgesPanel.innerHTML = "";

  inputs.forEach((input, index) => {
    const mot = motsParCase[input.id];

    if(!mot) return;

    const badge = document.createElement("div");
    badge.className = "badge";
    badge.id = "badge" + (index + 1);
    badge.dataset.word = mot;
    badge.textContent = String(index + 1);
    badge.addEventListener("pointerdown", commencerDrag);

    badgesPanel.appendChild(badge);
  });
}

function creerZonesDebug(){
  debugZones.innerHTML = "";

  zonesDepot.forEach(zone => {
    const div = document.createElement("div");
    div.className = "debug-zone";
    div.style.left = zone.x + "px";
    div.style.top = zone.y + "px";
    div.style.width = zone.w + "px";
    div.style.height = zone.h + "px";
    debugZones.appendChild(div);
  });
}

/* DRAG */

function commencerDrag(e){
  if(e.currentTarget.classList.contains("ok")) return;

  e.preventDefault();

  badgeActif = e.currentTarget;

  const rect = badgeActif.getBoundingClientRect();

  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  document.body.appendChild(badgeActif);

  badgeActif.classList.add("dragging");
  badgeActif.style.position = "fixed";
  badgeActif.style.left = rect.left + "px";
  badgeActif.style.top = rect.top + "px";
  badgeActif.style.zIndex = "9999";
}

document.addEventListener("pointermove", e => {
  if(!badgeActif) return;

  badgeActif.style.left = (e.clientX - offsetX) + "px";
  badgeActif.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("pointerup", e => {
  if(!badgeActif) return;

  const badgeRect = badgeActif.getBoundingClientRect();
  const centrePageX = badgeRect.left + badgeRect.width / 2;
  const centrePageY = badgeRect.top + badgeRect.height / 2;

  const imageRect = zoneImage.getBoundingClientRect();
  const centreImageX = centrePageX - imageRect.left;
  const centreImageY = centrePageY - imageRect.top;

  const zoneTrouvee = trouverZone(centreImageX, centreImageY);

  if(zoneTrouvee && zoneTrouvee.mot === badgeActif.dataset.word){
    placerBadgeDansZone(badgeActif, zoneTrouvee);
  } else {
    retourDepart(badgeActif);
  }

  badgeActif = null;
});

function trouverZone(x, y){
  return zonesDepot.find(zone =>
    x >= zone.x &&
    x <= zone.x + zone.w &&
    y >= zone.y &&
    y <= zone.y + zone.h
  );
}

function placerBadgeDansZone(badge, zone){
  zoneImage.appendChild(badge);

  badge.classList.remove("dragging");
  badge.classList.add("ok");

  badge.style.position = "absolute";
  badge.style.left = (zone.x + zone.w / 2 - 24) + "px";
  badge.style.top = (zone.y + zone.h / 2 - 24) + "px";
  badge.style.transform = "";
  badge.style.zIndex = "180";
  badge.style.pointerEvents = "none";

  badgesPlaces.add(badge.id);
  verifierFin();
}

function retourDepart(badge){
  badgesPanel.appendChild(badge);

  badge.classList.remove("dragging");
  badge.style.position = "";
  badge.style.left = "";
  badge.style.top = "";
  badge.style.transform = "";
  badge.style.zIndex = "";
}

function verifierFin(){
  if(badgesPlaces.size === 5){
    ajouterMotTrouve("Énigme 3", "ENSEMBLE");
    document.querySelector(".bloc-enigme3").classList.add("gagnee");
    braviFinal.classList.add("visible");

    setTimeout(() => {
      nextBtn.classList.add("visible");
    }, 1000);
  }
}

/* MÉMOIRE */

function ajouterMotTrouve(enigme, mot){
  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];

  if(!mots.some(item => item.enigme === enigme)){
    mots.push({ enigme, mot });
    localStorage.setItem("motsEscapeRebond", JSON.stringify(mots));
  }

  afficherMotsTrouves();
}

function afficherMotsTrouves(){
  const liste = document.getElementById("listeMots");
  if(!liste) return;

  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];
  liste.innerHTML = "";

  if(mots.length === 0){
    liste.innerHTML = "<li>Aucun mot</li>";
    return;
  }

  mots.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.enigme + " : " + item.mot;
    liste.appendChild(li);
  });
}
</script>

</body>
</html>
