<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 4</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme4{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-enigme4{
  position:relative;
  width:999px;
  height:716px;
  line-height:0;
  font-size:0;
}

.animation-4{
  display:block;
  width:999px;
  height:716px;
  border:0;
}

.drop-zone{
  position:absolute;
  z-index:20;
  border-radius:8px;
}

#zone1{ left:115px; top:226px; width:272px; height:42px; }
#zone2{ left:107px; top:288px; width:271px; height:54px; }
#zone3{ left:101px; top:377px; width:268px; height:53px; }
#zone4{ left:92px; top:450px; width:267px; height:52px; }
#zone5{ left:84px; top:517px; width:267px; height:48px; }
#zone6{ left:75px; top:582px; width:271px; height:53px; }

.lettres-panel{
  position:absolute;
  left:535px;
  top:378px;
  width:330px;
  height:60px;
  display:none;
  gap:12px;
  justify-content:center;
  align-items:center;
  z-index:50;
}

.lettres-panel.visible{
  display:flex;
}

.lettre{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#9e608b;
  color:#ffffff;
  font-size:28px;
  line-height:46px;
  font-weight:bold;
  text-align:center;
  cursor:grab;
  user-select:none;
  touch-action:none;
  box-shadow:0 3px 8px rgba(0,0,0,.25);
}

.lettre.dragging{
  cursor:grabbing;
  transform:scale(1.08);
  z-index:9999;
}

.lettre.ok{
  background:#18A558;
  color:#ffffff;
}

.jeu2{
  position:absolute;
  left:460px;
  top:370px;
  width:500px;
  height:auto;
  display:none;
  z-index:45;
}

.jeu2.visible{
  display:block;
}

.reponse-jeu2{
  position:absolute;
  left:620px;
  top:498px;
  width:155px;
  height:38px;
  z-index:70;
  border:none;
  outline:none;
  background:transparent;
  font-size:28px;
  font-weight:bold;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:4px;
  color:#111;
  display:none;
}

.reponse-jeu2.visible{
  display:block;
}

.reponse-jeu2.ok{
  background:#18A558;
  color:#ffffff;
  border-radius:8px;
}

.reponse-jeu2.erreur{
  background:#c0392b;
  color:#ffffff;
  border-radius:8px;
}

/* ONGLET INVENTAIRE */

/* Sac */

.inventaire{
    position:absolute;
    left:-70px;
    top:0;
    height:716px;
    z-index:3000;
}

.inventaire-tab{
    position:absolute;
    left:0;
    top:25px;
    width:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.inventaire-tab img{
    width:80px;
    height:auto;
    transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
    transform:scale(1.08);
}

/* Tiroir */

.inventaire-content{
    position:absolute;
    left:70px;
    top:10;

    width:0;
    height:200px;

    overflow:hidden;

background:rgba(255,255,255,.30);   /* blanc à 30 % */
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

color:#044e61;

    transition:width .35s ease;

    border-radius:0 18px 18px 0;

    box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
    width:230px;
}

.inventaire-content-inner{
    width:230px;
    height:716px;
    padding:25px 18px;
    overflow-y:auto;
}

.inventaire-content h3{
    font-size:18px;
    margin-bottom:18px;
    color:#044e61;
}

.inventaire-content ul{
    list-style:none;
}

.inventaire-content li{
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,.55);
    color:#044e61;
    font-weight:bold;
}

.next-arrow{
  position:fixed;
  top:50%;
  right:35px;
  transform:translateY(-50%) translateX(12px);
  font-size:62px;
  font-weight:200;
  color:#ffffff;
  text-decoration:none;
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:999;
}

.next-arrow.visible{
  opacity:.45;
  pointer-events:auto;
  transform:translateY(-50%) translateX(0);
}

.next-arrow:hover{
  opacity:1;
  transform:translateY(-50%) translateX(6px);
}
</style>
</head>

<body>

<div class="page-enigme4">

  <div class="bloc-enigme4" id="zoneImage">

    <div class="inventaire" id="inventaire">
      <div class="inventaire-tab">
        <img src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png" alt="Inventaire">
      </div>

      <div class="inventaire-content">
        <div class="inventaire-content-inner">
          <h3>Mots trouvés</h3>
          <ul id="listeMots"></ul>
        </div>
      </div>
    </div>

    <video
      id="videoEnigme4"
      class="animation-4"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme4/enigme4.mp4"
      autoplay
      muted
      playsinline>
    </video>

    <div class="drop-zone" id="zone1" data-answer="E"></div>
    <div class="drop-zone" id="zone2" data-answer="A"></div>
    <div class="drop-zone" id="zone3" data-answer="C"></div>
    <div class="drop-zone" id="zone4" data-answer="D"></div>
    <div class="drop-zone" id="zone5" data-answer="B"></div>
    <div class="drop-zone" id="zone6" data-answer="F"></div>

    <div class="lettres-panel" id="lettresPanel">
      <div class="lettre" data-letter="A">A</div>
      <div class="lettre" data-letter="B">B</div>
      <div class="lettre" data-letter="C">C</div>
      <div class="lettre" data-letter="D">D</div>
      <div class="lettre" data-letter="E">E</div>
      <div class="lettre" data-letter="F">F</div>
    </div>

    <img
      id="jeu2"
      class="jeu2"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme4/jeu2.png"
      alt="Jeu 2">

    <input
      id="reponseJeu2"
      class="reponse-jeu2"
      type="text"
      maxlength="6"
      autocomplete="off">

  </div>

</div>

<a href="enigme5.html" class="next-arrow" id="nextBtn" title="Énigme suivante">→</a>

<script>
const videoEnigme4 = document.getElementById("videoEnigme4");
const lettresPanel = document.getElementById("lettresPanel");
const nextBtn = document.getElementById("nextBtn");
const jeu2 = document.getElementById("jeu2");
const reponseJeu2 = document.getElementById("reponseJeu2");

let lettreActive = null;
let offsetX = 0;
let offsetY = 0;

afficherMotsTrouves();

videoEnigme4.addEventListener("ended", () => {
  lettresPanel.classList.add("visible");
});

document.querySelectorAll(".lettre").forEach(lettre => {
  lettre.addEventListener("pointerdown", commencerDrag);
});

function commencerDrag(e){
  if(e.currentTarget.classList.contains("ok")) return;

  e.preventDefault();

  lettreActive = e.currentTarget;

  const rect = lettreActive.getBoundingClientRect();

  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  document.body.appendChild(lettreActive);

  lettreActive.classList.add("dragging");
  lettreActive.style.position = "fixed";
  lettreActive.style.left = rect.left + "px";
  lettreActive.style.top = rect.top + "px";
  lettreActive.style.zIndex = "9999";
}

document.addEventListener("pointermove", e => {
  if(!lettreActive) return;

  lettreActive.style.left = (e.clientX - offsetX) + "px";
  lettreActive.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("pointerup", e => {
  if(!lettreActive) return;

  let zoneTrouvee = null;

  document.querySelectorAll(".drop-zone").forEach(zone => {
    const rect = zone.getBoundingClientRect();

    if(
      e.clientX >= rect.left &&
      e.clientX <= rect.right &&
      e.clientY >= rect.top &&
      e.clientY <= rect.bottom
    ){
      zoneTrouvee = zone;
    }
  });

  if(zoneTrouvee && lettreActive.dataset.letter === zoneTrouvee.dataset.answer){
    zoneTrouvee.appendChild(lettreActive);

    lettreActive.classList.remove("dragging");
    lettreActive.classList.add("ok");

    lettreActive.style.position = "absolute";
    lettreActive.style.left = "50%";
    lettreActive.style.top = "50%";
    lettreActive.style.transform = "translate(-50%, -50%)";
    lettreActive.style.zIndex = "80";
    lettreActive.style.pointerEvents = "none";

    verifierFinJeu1();

  } else {
    retourDepart(lettreActive);
  }

  lettreActive = null;
});

function retourDepart(lettre){
  lettresPanel.appendChild(lettre);

  lettre.classList.remove("dragging");
  lettre.style.position = "";
  lettre.style.left = "";
  lettre.style.top = "";
  lettre.style.transform = "";
  lettre.style.zIndex = "";
}

function verifierFinJeu1(){
  const lettresOk = document.querySelectorAll(".lettre.ok");

  if(lettresOk.length === 6){
    lettresPanel.style.display = "none";
    jeu2.classList.add("visible");
    reponseJeu2.classList.add("visible");
    reponseJeu2.focus();
  }
}

reponseJeu2.addEventListener("input", () => {
  reponseJeu2.value = reponseJeu2.value.toUpperCase();

  const valeur = nettoyerTexte(reponseJeu2.value);

  reponseJeu2.classList.remove("erreur");

  if(valeur === "ALERTE"){
    reponseJeu2.classList.add("ok");
    reponseJeu2.readOnly = true;

    ajouterMotTrouve("Énigme 4", "ALERTE");

    nextBtn.classList.add("visible");
  }
});

reponseJeu2.addEventListener("blur", () => {
  const valeur = nettoyerTexte(reponseJeu2.value);

  if(valeur.length > 0 && valeur !== "ALERTE"){
    reponseJeu2.classList.add("erreur");
  }
});

function nettoyerTexte(texte){
  return texte
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Z]/g,"");
}

function ajouterMotTrouve(enigme, mot){
  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];
  const existeDeja = mots.some(item => item.enigme === enigme);

  if(!existeDeja){
    mots.push({ enigme, mot });
    localStorage.setItem("motsEscapeRebond", JSON.stringify(mots));
  }

  afficherMotsTrouves();
}

function afficherMotsTrouves(){
  const liste = document.getElementById("listeMots");
  if(!liste) return;

  const mots = JSON.parse(localStorage.getItem("motsEscapeRebond")) || [];
  liste.innerHTML = "";

  if(mots.length === 0){
    const li = document.createElement("li");
    li.textContent = "Aucun mot";
    liste.appendChild(li);
    return;
  }

  mots.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.enigme + " : " + item.mot;
    liste.appendChild(li);
  });
}
</script>

</body>
</html>
