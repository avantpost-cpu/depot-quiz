<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Énigme 5</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-enigme5{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-enigme5{
  position:relative;
  width:999px;
  height:716px;
  line-height:0;
  font-size:0;
}

.animation-5{
  display:block;
  width:999px;
  height:716px;
  border:0;
}

/* BOUTON IMAGE DE DÉMARRAGE */

.bouton-video{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:2000;

  display:none;

  border:0;
  padding:0;
  margin:0;
  background:transparent;

  cursor:pointer;
}

.bouton-video.visible{
  display:block;
}

.bouton-video img{
  display:block;
  width:auto;
  height:auto;
  max-width:320px;
  max-height:180px;
  pointer-events:none;

  filter:drop-shadow(0 8px 18px rgba(0,0,0,.35));
  transition:transform .2s ease;
}

.bouton-video:hover img{
  transform:scale(1.05);
}

.bouton-video:focus-visible{
  outline:3px solid rgba(255,255,255,.95);
  outline-offset:5px;
  border-radius:8px;
}

/* CADENAS */

.code-panel{
  position:absolute;
  left:600px;
  top:537px;
  display:none;
  gap:6px;
  z-index:60;
}

.code-panel.visible{
  display:flex;
}

.chiffre{
  width:48px;
  height:68px;
  border:none;
  background:transparent;
  color:#000000;
  font-size:48px;
  line-height:68px;
  font-weight:700;
  text-align:center;
  cursor:pointer;
  font-family:Arial, Helvetica, sans-serif;
}

.chiffre.ok{
  color:#18A558;
}

.cadenas-ouvert{
  animation:ouvrirCadenas .5s ease forwards;
}

@keyframes ouvrirCadenas{
  0%{
    transform:translateY(0);
  }

  40%{
    transform:translateY(-6px);
  }

  100%{
    transform:translateY(12px);
    opacity:.55;
  }
}

/* SAC INVENTAIRE */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
  transform:scale(1.08);
}

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  height:200px;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
  width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;
  padding:25px 18px;
  overflow-y:auto;
  line-height:1.3;
}

.inventaire-content h3,
.navigation-content h3{
  font-size:18px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{
  list-style:none;
}

.inventaire-content li{
  display:block;
  line-height:18px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
}

/* LOUPE ÉNIGMES */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;
  height:716px;
  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;
  width:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;
  display:block;
  pointer-events:none;
  transition:transform .25s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;
  width:0;
  overflow:hidden;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#044e61;
  transition:width .35s ease;
  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;
  padding:22px 18px 16px;
  overflow:visible;
  line-height:1.3;
}

.navigation-content a{
  display:block;
  line-height:18px;
  margin-bottom:8px;
  padding:9px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.55);
  color:#044e61;
  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:last-child{
  margin-bottom:0;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}

/* ÉCRANS PLUS PETITS */

@media screen and (max-width:1140px){
  .page-enigme5{
    align-items:flex-start;
    padding-left:85px;
  }
}
</style>
</head>

<body>

<div class="page-enigme5">

  <div class="bloc-enigme5">

    <!-- SAC -->

    <div class="inventaire" id="inventaire">

      <div class="inventaire-tab">
        <img
          src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png"
          alt="Inventaire">
      </div>

      <div class="inventaire-content">

        <div class="inventaire-content-inner">

          <h3>Mots trouvés</h3>

          <ul id="listeMots"></ul>

        </div>

      </div>

    </div>

    <!-- LOUPE -->

    <div class="navigation-enigmes" id="navigationEnigmes">

      <div class="navigation-tab">
        <img
          src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png"
          alt="Énigmes">
      </div>

      <div class="navigation-content">

        <div class="navigation-content-inner">

          <h3>Énigmes</h3>

          <a href="enigme1.html">Énigme 1</a>
          <a href="enigme2.html">Énigme 2</a>
          <a href="enigme3.html">Énigme 3</a>
          <a href="enigme4.html">Énigme 4</a>
          <a href="enigme5.html">Énigme 5</a>

        </div>

      </div>

    </div>

    <!-- VIDÉO EN PAUSE SUR LA PREMIÈRE IMAGE -->

    <video
      id="videoEnigme5"
      class="animation-5"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme5/enigme5.mp4"
      playsinline
      preload="auto">
    </video>

    <!-- SONS -->

    <audio
      id="clickSound"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme5/click.mp3"
      preload="auto">
    </audio>

    <audio
      id="unlockSound"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme5/unlock.mp3"
      preload="auto">
    </audio>

    <!-- BOUTON IMAGE CENTRAL -->

    <button
      class="bouton-video visible"
      id="boutonVideo"
      type="button"
      aria-label="Lancer la vidéo avec le son">

      <img
        src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/enigme5/bouton.png"
        alt="Continuer">

    </button>

    <!-- CADENAS -->

    <div class="code-panel" id="codePanel">

      <button class="chiffre" data-index="0" type="button">0</button>
      <button class="chiffre" data-index="1" type="button">0</button>
      <button class="chiffre" data-index="2" type="button">0</button>

    </div>

  </div>

</div>

<script>
const videoEnigme5 =
  document.getElementById("videoEnigme5");

const boutonVideo =
  document.getElementById("boutonVideo");

const codePanel =
  document.getElementById("codePanel");

const chiffres =
  document.querySelectorAll(".chiffre");

const clickSound =
  document.getElementById("clickSound");

const unlockSound =
  document.getElementById("unlockSound");

let code = [0, 0, 0];
let jeuTermine = false;
let videoDemarree = false;

afficherMotsTrouves();

/* ======================================================
   PRÉPARATION DE LA PREMIÈRE IMAGE
====================================================== */

/*
  Le bouton est visible dès l'affichage de la page.
  La vidéo est chargée mais reste en pause.
*/

videoEnigme5.pause();
videoEnigme5.muted = false;
videoEnigme5.volume = 1;
videoEnigme5.load();

/* ======================================================
   LANCEMENT DE LA VIDÉO AVEC LE SON
====================================================== */

boutonVideo.addEventListener(
  "click",
  async function(event){

    event.preventDefault();
    event.stopPropagation();

    if(videoDemarree){
      return;
    }

    videoDemarree = true;

    boutonVideo.disabled = true;
    boutonVideo.classList.remove(
      "visible"
    );

    videoEnigme5.muted = false;
    videoEnigme5.volume = 1;

    try{

      /*
        On évite de modifier currentTime juste avant play(),
        car certains navigateurs annulent alors la lecture.
      */

      await videoEnigme5.play();

    }
    catch(erreur){

      console.error(
        "Impossible de lancer la vidéo :",
        erreur
      );

      videoDemarree = false;
      boutonVideo.disabled = false;

      boutonVideo.classList.add(
        "visible"
      );

    }

  }
);

/* ======================================================
   AFFICHAGE DU CADENAS À LA FIN DE LA VIDÉO
====================================================== */

videoEnigme5.addEventListener(
  "ended",
  function(){

    codePanel.classList.add(
      "visible"
    );

  }
);

/* ======================================================
   MODIFICATION DES CHIFFRES
====================================================== */

chiffres.forEach(function(chiffre){

  chiffre.addEventListener(
    "click",
    function(){

      if(jeuTermine){
        return;
      }

      const index =
        Number(chiffre.dataset.index);

      code[index] =
        (code[index] + 1) % 10;

      chiffre.textContent =
        code[index];

      jouerSonClick();

      verifierCode();

    }
  );

});

/* ======================================================
   SON À CHAQUE CHANGEMENT DE CHIFFRE
====================================================== */

function jouerSonClick(){

  /*
    Un clone permet de rejouer le son immédiatement,
    même si le joueur clique plusieurs fois très vite.
  */

  const son =
    clickSound.cloneNode(true);

  son.volume = 1;

  son.play().catch(function(erreur){

    console.warn(
      "Le son de clic n'a pas pu être lu :",
      erreur
    );

  });

}

/* ======================================================
   VÉRIFICATION DU CODE
====================================================== */

function verifierCode(){

  if(code.join("") !== "119"){
    return;
  }

  jeuTermine = true;

  /*
    Son d'ouverture joué une seule fois
    lorsque le code 119 est validé.
  */

  unlockSound.pause();
  unlockSound.currentTime = 0;
  unlockSound.volume = 1;

  unlockSound.play().catch(function(erreur){

    console.warn(
      "Le son d'ouverture n'a pas pu être lu :",
      erreur
    );

  });

  chiffres.forEach(function(chiffre){

    chiffre.classList.add(
      "ok"
    );

    chiffre.disabled = true;

  });

  codePanel.classList.add(
    "cadenas-ouvert"
  );

  ajouterMotTrouve(
    "Énigme 5",
    "DANS"
  );

  /*
    Petit délai pour laisser apparaître le code en vert
    et l'animation d'ouverture du cadenas.
  */

  window.setTimeout(function(){

    window.location.href =
      "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/fin.html";

  }, 700);

}

/* ======================================================
   ENREGISTREMENT DU MOT
====================================================== */

function ajouterMotTrouve(enigme, mot){

  let mots = [];

  try{

    mots =
      JSON.parse(
        localStorage.getItem("motsEscapeRebond")
      ) || [];

  }
  catch(erreur){

    mots = [];

  }

  const motExiste =
    mots.some(function(item){

      return (
        typeof item === "object" &&
        item !== null &&
        item.enigme === enigme
      );

    });

  if(!motExiste){

    mots.push({
      enigme:enigme,
      mot:mot
    });

    localStorage.setItem(
      "motsEscapeRebond",
      JSON.stringify(mots)
    );

  }

  afficherMotsTrouves();

}

/* ======================================================
   AFFICHAGE DE L'INVENTAIRE
====================================================== */

function afficherMotsTrouves(){

  const liste =
    document.getElementById("listeMots");

  if(!liste){
    return;
  }

  let mots = [];

  try{

    mots =
      JSON.parse(
        localStorage.getItem("motsEscapeRebond")
      ) || [];

  }
  catch(erreur){

    mots = [];

  }

  liste.innerHTML = "";

  if(mots.length === 0){

    const li =
      document.createElement("li");

    li.textContent =
      "Aucun mot";

    liste.appendChild(li);

    return;
  }

  mots.forEach(function(item){

    const li =
      document.createElement("li");

    if(
      typeof item === "object" &&
      item !== null &&
      item.enigme &&
      item.mot
    ){

      li.textContent =
        item.enigme + " : " + item.mot;

    }
    else{

      li.textContent =
        String(item);

    }

    liste.appendChild(li);

  });

}
</script>

</body>
</html>
