<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Révélation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-fin{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-fin{
  position:relative;
  width:999px;
  height:716px;
  line-height:0;
  font-size:0;
}

.animation-fin{
  display:block;
  width:999px;
  height:716px;
  border:0;
}


/* ======================================================
   BOUTON DE DÉMARRAGE AVEC LE SON
====================================================== */

.bouton-demarrer-fin{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);

  z-index:2550;

  display:none;

  padding:15px 32px;
  border:0;
  border-radius:999px;

  background:#e65b10;
  color:#000000;

  font-family:Arial, Helvetica, sans-serif;
  font-size:20px;
  line-height:24px;
  font-weight:700;

  cursor:pointer;

  box-shadow:0 8px 24px rgba(0,0,0,.35);

  transition:
    transform .2s ease,
    box-shadow .2s ease,
    opacity .2s ease;
}

.bouton-demarrer-fin.visible{
  display:block;
}

.bouton-demarrer-fin:hover{
  transform:translate(-50%,-50%) scale(1.05);
  box-shadow:0 10px 28px rgba(0,0,0,.42);
}

.bouton-demarrer-fin:focus-visible{
  outline:3px solid rgba(255,255,255,.95);
  outline-offset:4px;
}

/* ======================================================
   ZONE DU CARNET
====================================================== */

.carnet-zone{
  position:absolute;
  left:304px;
  top:183px;
  width:635px;
  height:479px;

  overflow:visible;
  cursor:pointer;
  z-index:100;

  perspective:1900px;
  perspective-origin:50% 50%;
  transform-style:preserve-3d;

  background:transparent;
  outline:none;
}

.carnet-zone:focus-visible{
  outline:3px solid rgba(255,255,255,.85);
  outline-offset:3px;
}

/* ======================================================
   PAGE FIXE ACTUELLE
====================================================== */

.page-carnet-actuelle{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  display:block;
  object-fit:fill;

  opacity:0;
  pointer-events:none;

  z-index:5;
}

.page-carnet-actuelle.visible{
  opacity:1;
}

/* ======================================================
   NOUVELLE PAGE RÉVÉLÉE PROGRESSIVEMENT
====================================================== */

.page-suivante{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  z-index:10;
  pointer-events:none;

  opacity:0;
}

.page-suivante.visible{
  opacity:1;
}

/*
  Les deux moitiés utilisent la même image complète.
  Chaque moitié masque simplement la partie opposée.
*/

.revelation-gauche,
.revelation-droite{
  position:absolute;
  top:0;

  width:50%;
  height:100%;

  overflow:hidden;
  pointer-events:none;
}

.revelation-gauche{
  left:0;
}

.revelation-droite{
  left:50%;
}

.revelation-gauche img,
.revelation-droite img{
  position:absolute;
  top:0;

  width:200%;
  height:100%;
  max-width:none;

  display:block;
  object-fit:fill;

  user-select:none;
  pointer-events:none;

  filter:none;
  box-shadow:none;
}

/* Image complète alignée dans la moitié gauche */

.revelation-gauche img{
  left:0;
}

/* Image complète décalée pour afficher sa moitié droite */

.revelation-droite img{
  right:0;
}

/*
  La nouvelle page droite apparaît assez tôt,
  comme si elle se trouvait déjà sous le paquet.
*/

.revelation-droite{
  clip-path:inset(0 100% 0 0);
  opacity:0;
}

.revelation-droite.en-cours{
  animation:
    revelerPageDroite var(--duree-droite) ease-out forwards;
}

/*
  La nouvelle page gauche apparaît plus tard,
  au fur et à mesure que les versos se posent à gauche.
*/

.revelation-gauche{
  clip-path:inset(0 0 0 100%);
  opacity:0;
}

.revelation-gauche.en-cours{
  animation:
    revelerPageGauche var(--duree-gauche) ease-in-out
    var(--retard-gauche) forwards;
}

@keyframes revelerPageDroite{

  0%{
    clip-path:inset(0 100% 0 0);
    opacity:0;
  }

  18%{
    opacity:.22;
  }

  55%{
    clip-path:inset(0 30% 0 0);
    opacity:.78;
  }

  100%{
    clip-path:inset(0 0 0 0);
    opacity:1;
  }
}

@keyframes revelerPageGauche{

  0%{
    clip-path:inset(0 0 0 100%);
    opacity:0;
  }

  12%{
    opacity:.12;
  }

  45%{
    clip-path:inset(0 0 0 55%);
    opacity:.55;
  }

  75%{
    clip-path:inset(0 0 0 18%);
    opacity:.88;
  }

  100%{
    clip-path:inset(0 0 0 0);
    opacity:1;
  }
}

/* ======================================================
   PAQUET DE FEUILLES
====================================================== */

.paquet-pages{
  position:absolute;
  inset:0;

  z-index:50;
  pointer-events:none;

  overflow:visible;
  transform-style:preserve-3d;
}

.feuille{
  position:absolute;
  top:0;
  left:50%;

  width:50%;
  height:100%;

  opacity:0;

  transform-origin:left center;
  transform-style:preserve-3d;

  overflow:visible;
  pointer-events:none;
}

/* Recto et verso */

.face-feuille,
.verso-feuille{
  position:absolute;
  inset:0;

  overflow:visible;

  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;

  background:transparent;
}

.face-feuille img,
.verso-feuille img{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  display:block;
  object-fit:fill;

  pointer-events:none;
  user-select:none;

  filter:none;
  box-shadow:none;
}

.verso-feuille{
  transform:rotateY(180deg);
}

/* ======================================================
   ANIMATION DES FEUILLES
====================================================== */

.feuille.active{
  opacity:1;

  animation:
    tournerFeuille 1.05s cubic-bezier(.48,.02,.18,1) forwards;
}

@keyframes tournerFeuille{

  0%{
    transform:
      rotateY(0deg)
      rotateZ(0deg)
      skewY(0deg)
      scaleX(1)
      scaleY(1)
      translateY(0)
      translateZ(0);
  }

  14%{
    transform:
      rotateY(-16deg)
      rotateZ(-.4deg)
      skewY(-.5deg)
      scaleX(.99)
      scaleY(1.015)
      translateY(-3px)
      translateZ(5px);
  }

  32%{
    transform:
      rotateY(-50deg)
      rotateZ(-1deg)
      skewY(-1.5deg)
      scaleX(.95)
      scaleY(1.04)
      translateY(-8px)
      translateZ(13px);
  }

  52%{
    transform:
      rotateY(-92deg)
      rotateZ(-1.5deg)
      skewY(-2.5deg)
      scaleX(.88)
      scaleY(1.075)
      translateY(-17px)
      translateZ(25px);
  }

  72%{
    transform:
      rotateY(-138deg)
      rotateZ(-.8deg)
      skewY(-1.2deg)
      scaleX(.95)
      scaleY(1.045)
      translateY(-10px)
      translateZ(14px);
  }

  91%{
    transform:
      rotateY(-172deg)
      rotateZ(-.2deg)
      skewY(-.3deg)
      scaleX(.99)
      scaleY(1.015)
      translateY(-3px)
      translateZ(4px);
  }

  100%{
    transform:
      rotateY(-180deg)
      rotateZ(0deg)
      skewY(0deg)
      scaleX(1)
      scaleY(1)
      translateY(0)
      translateZ(0);
  }
}

/* ======================================================
   SAC INVENTAIRE
====================================================== */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;

  width:70px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;

  display:block;
  pointer-events:none;

  transition:transform .25s;

  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
  transform:scale(1.08);
}

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;

  width:0;
  height:200px;

  overflow:hidden;

  background:rgba(255,255,255,.30);

  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);

  color:#044e61;

  transition:width .35s ease;

  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
  width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;

  padding:25px 18px;

  overflow-y:auto;

  line-height:1.3;
}

.inventaire-content h3,
.navigation-content h3{
  font-size:18px;
  line-height:22px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{
  list-style:none;
}

.inventaire-content li{
  display:block;

  line-height:18px;

  margin-bottom:10px;

  border-radius:10px;

  font-weight:bold;
  font-size:14px;
}

/* ======================================================
   LOUPE
====================================================== */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;

  height:716px;

  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;

  width:70px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;
}

.navigation-tab img{

  height:auto;

  display:block;
  pointer-events:none;

  transition:transform .25s;

  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;

  width:0;

  overflow:hidden;

  background:rgba(255,255,255,.30);

  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);

  color:#044e61;

  transition:width .35s ease;

  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;

  padding:22px 18px 16px;

  overflow:visible;

  line-height:1.3;
}

.navigation-content a{
  display:block;

  line-height:18px;

  margin-bottom:8px;
  padding:9px 10px;

  border-radius:10px;

  background:rgba(255,255,255,.55);

  color:#044e61;

  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:last-child{
  margin-bottom:0;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}



/* ======================================================
   SÉQUENCE VIDÉO ET RÉPONSES FINALES
====================================================== */

.video-jeu-final,
.reponses-finales{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:none;

}

.video-jeu-final{

}

.video-jeu-final.visible,
.reponses-finales.visible{
  display:block;
}

.reponses-finales{
  background:transparent;
  pointer-events:none;
  z-index:125;
}

.champ-morse{
  position:absolute;
  left:238px;
  width:319px;
  height:49px;
  border:0;
  outline:0;
  padding:2px 12px 0;
  background:transparent;
  color:#000;
  font-family:Arial, Helvetica, sans-serif;
  font-size:31px;
  line-height:49px;
  font-weight:900;
  text-align:center;

  letter-spacing:1px;
  box-shadow:none;
  pointer-events:auto;
}

.champ-morse::placeholder{
  color:rgba(0,0,0,.35);
}

.champ-morse:focus{
  background:transparent;
}

.champ-morse:-webkit-autofill,
.champ-morse:-webkit-autofill:hover,
.champ-morse:-webkit-autofill:focus{
  -webkit-text-fill-color:#000;
  -webkit-box-shadow:0 0 0 1000px transparent inset;
  box-shadow:0 0 0 1000px transparent inset;
  transition:background-color 9999s ease-out 0s;
}

.champ-morse-1{
  top:253px;
  transform:rotate(-2.8deg);
}

.champ-morse-2{
  top:311px;
  transform:rotate(-3.7deg);
}

.champ-morse-3{
  top:369px;
  transform:rotate(-4.2deg);
}

.champ-morse.correct{
  background:#39b54a;
  color:#ffffff;
  border-radius:8px;
}

.champ-morse.erreur{
  background:transparent;
  color:#c0392b;
}

.message-reussite{
  position:absolute;
  left:205px;
  bottom:12px;
  width:380px;
  padding:9px 14px;
  border-radius:12px;
  background:rgba(4,78,97,.94);
  color:#fff;
  font-size:17px;
  line-height:21px;
  font-weight:bold;
  text-align:center;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .3s ease, transform .3s ease;
}

.message-reussite.visible{
  opacity:1;
  transform:translateY(0);
}

.bouton-lire-video{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:130;
  display:none;
  border:0;
  border-radius:999px;
  padding:14px 24px;
  background:#65e13f;
  color:#000;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.bouton-lire-video.visible{
  display:block;
}


/* ======================================================
   BRAVI FINAL — UNIQUEMENT APRÈS LES TROIS BONNES RÉPONSES
====================================================== */

.bloc-fin.gagnee .animation-fin,
.bloc-fin.gagnee .carnet-zone{
  opacity:.5;
  filter:saturate(.5);
  transition:opacity .45s ease, filter .45s ease;
}

.bravi-final{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  opacity:0;
  pointer-events:none;
  z-index:2600;

  transition:opacity .45s ease;
}

.bravi-final.visible{
  opacity:1;
}

.bravi-final img{
  width:50%;
  height:auto;
  display:block;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
}

====================================================== */

@media screen and (max-width:1140px){

  }

}
</style>

<script>

let sequenceFinaleLancee = false;
let enigmeFinaleValidee = false;
let attenteClicApresFinE = false;


/* ======================================================
   IMAGES
====================================================== */

const pagesCarnet = [
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finA.png",
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finB.png",

];

const imageRecto =
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/droite.png";

const imageVerso =
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/gauche.png";

/* ======================================================
   RÉGLAGES DU FEUILLETAGE
====================================================== */

const nombreDeFeuilles = 7;
const decalageFeuilles = 68;
const dureeRotation = 1050;

const dureeTotale =
  dureeRotation +
  ((nombreDeFeuilles - 1) * decalageFeuilles);

/*
  La moitié droite commence immédiatement.

  La moitié gauche commence lorsque plusieurs versos
  sont déjà arrivés du côté gauche.
*/

const dureeRevelationDroite =
  Math.round(dureeTotale * .68);

const retardRevelationGauche =
  Math.round(dureeTotale * .28);

const dureeRevelationGauche =
  Math.round(dureeTotale * .72);

document.documentElement.style.setProperty(
  "--duree-droite",
  dureeRevelationDroite + "ms"
);

document.documentElement.style.setProperty(
  "--retard-gauche",
  retardRevelationGauche + "ms"
);

document.documentElement.style.setProperty(
  "--duree-gauche",
  dureeRevelationGauche + "ms"
);

let pageActuelle = -1;
let animationEnCours = false;

/* ======================================================
   PRÉCHARGEMENT
====================================================== */

[
  ...pagesCarnet,
  imageRecto,
  imageVerso
].forEach(function(adresse){

  const image = new Image();
  image.src = adresse;

});

/* ======================================================
   CRÉATION DES FEUILLES
====================================================== */

function creerPaquetPages(){

  paquetPages.innerHTML = "";

  for(let i = 0; i < nombreDeFeuilles; i++){

    const feuille =
      document.createElement("div");

    feuille.className =
      "feuille";

    feuille.style.zIndex =
      String(nombreDeFeuilles - i);

    /* RECTO */

    const face =
      document.createElement("div");

    face.className =
      "face-feuille";

    const recto =
      document.createElement("img");

    recto.src =
      imageRecto;

    recto.alt = "";
    recto.draggable = false;

    face.appendChild(recto);

    /* VERSO */

    const verso =
      document.createElement("div");

    verso.className =
      "verso-feuille";

    const imageDos =
      document.createElement("img");

    imageDos.src =
      imageVerso;

    imageDos.alt = "";
    imageDos.draggable = false;

    verso.appendChild(imageDos);

    feuille.appendChild(face);
    feuille.appendChild(verso);

    paquetPages.appendChild(feuille);

  }

}

creerPaquetPages();

/* ======================================================
   DÉMARRAGE DE LA PAGE AVEC LE SON
====================================================== */

let pageDemarree = false;

/*
  La première image de la vidéo reste affichée.
  La lecture ne commence qu'après le clic sur « Continuer ».
*/

function preparerPremiereImage(){

  videoFin.pause();

  try{
    videoFin.currentTime = 0;
  }
  catch(erreur){
    /*
      Certains navigateurs n'autorisent currentTime
      qu'après le chargement des métadonnées.
    */
  }

  boutonDemarrerFin.classList.add(
    "visible"
  );

}

if(videoFin.readyState >= 1){

  preparerPremiereImage();

}
else{

  videoFin.addEventListener(
    "loadedmetadata",
    preparerPremiereImage,
    {
      once:true
    }
  );

}

boutonDemarrerFin.addEventListener(
  "click",
  function(event){

    event.preventDefault();
    event.stopPropagation();

    if(pageDemarree){
      return;
    }

    pageDemarree = true;

    boutonDemarrerFin.classList.remove(
      "visible"
    );

    /*
      La première vidéo démarre directement avec le son.
      Ce clic constitue l'interaction utilisateur exigée
      par les navigateurs.
    */

    videoFin.muted = false;
    videoFin.volume = 1;
    videoFin.currentTime = 0;

    const lectureInitiale =
      videoFin.play();

    if(
      lectureInitiale &&
      typeof lectureInitiale.catch === "function"
    ){

      lectureInitiale.catch(function(){

        pageDemarree = false;

        boutonDemarrerFin.classList.add(
          "visible"
        );

      });

    }

    /*
      Préparation discrète de la vidéo finale pendant
      ce même geste utilisateur. Elle reste invisible,
      sans son et revient immédiatement à sa première image.
    */

    videoJeuFinal.muted = true;
    videoJeuFinal.volume = 0;
    videoJeuFinal.currentTime = 0;

    const preparationVideoFinale =
      videoJeuFinal.play();

    if(
      preparationVideoFinale &&
      typeof preparationVideoFinale.then === "function"
    ){

      preparationVideoFinale
        .then(function(){

          videoJeuFinal.pause();
          videoJeuFinal.currentTime = 0;
          videoJeuFinal.volume = 1;
          videoJeuFinal.muted = false;

        })
        .catch(function(){

          videoJeuFinal.pause();
          videoJeuFinal.currentTime = 0;
          videoJeuFinal.volume = 1;
          videoJeuFinal.muted = false;

        });

    }

  }
);

/* ======================================================
   INTERACTIONS
====================================================== */

carnetZone.addEventListener(
  "click",
  tournerPages
);

carnetZone.addEventListener(
  "keydown",
  function(event){

    if(
      event.key === "Enter" ||
      event.key === " "
    ){

      event.preventDefault();
      tournerPages();

    }

  }
);

/* ======================================================
   TOURNER LES PAGES
====================================================== */

function tournerPages(){

  if(animationEnCours){
    return;
  }

  /*
    Lorsque finE.png est affichée, on attend volontairement
    un nouveau clic du joueur avant de lancer la vidéo finale.
    Cela lui laisse le temps de lire entièrement la page.
  */

  if(attenteClicApresFinE){

    attenteClicApresFinE = false;

    carnetZone.style.cursor =
      "default";

    carnetZone.removeAttribute(
      "title"
    );

    carnetZone.setAttribute(
      "aria-label",
      "Vidéo de la dernière énigme"
    );

    lancerSequenceFinale();

    return;
  }

  if(pageActuelle >= pagesCarnet.length - 1){
    return;
  }

  animationEnCours = true;

  const indexSuivant =
    pageActuelle + 1;

  const nouvelleImage =
    pagesCarnet[indexSuivant];

  const feuilles =
    paquetPages.querySelectorAll(".feuille");

  /*
    Préparation immédiate de la nouvelle double page.
  */

  imageSuivanteGauche.src =
    nouvelleImage;

  imageSuivanteDroite.src =
    nouvelleImage;

  pageSuivante.classList.add(
    "visible"
  );

  /*
    Réinitialisation des animations de révélation.
  */

  revelationGauche.classList.remove(
    "en-cours"
  );

  revelationDroite.classList.remove(
    "en-cours"
  );

  feuilles.forEach(function(feuille){

    feuille.classList.remove(
      "active"
    );

    feuille.style.animationDelay =
      "0ms";

  });

  void pageSuivante.offsetWidth;
  void paquetPages.offsetWidth;

  /*
    Révélation progressive de la page fixe.
  */

  revelationDroite.classList.add(
    "en-cours"
  );

  revelationGauche.classList.add(
    "en-cours"
  );

  /*
    Feuilletage.
  */

  feuilles.forEach(function(feuille, index){

    feuille.style.animationDelay =
      (index * decalageFeuilles) + "ms";

    feuille.classList.add(
      "active"
    );

  });

  /*
    Fin de la transition.
  */

  window.setTimeout(function(){

    /*
      La nouvelle image devient la page fixe officielle.

      Visuellement, elle est déjà entièrement présente :
      ce remplacement est donc invisible.
    */

    pageCarnetActuelle.src =
      nouvelleImage;

    pageCarnetActuelle.classList.add(
      "visible"
    );

    pageActuelle =
      indexSuivant;

    /*
      Retrait des éléments temporaires.
    */

    window.requestAnimationFrame(function(){

      feuilles.forEach(function(feuille){

        feuille.classList.remove(
          "active"
        );

        feuille.style.animationDelay =
          "0ms";

      });

      revelationGauche.classList.remove(
        "en-cours"
      );

      revelationDroite.classList.remove(
        "en-cours"
      );

      pageSuivante.classList.remove(
        "visible"
      );

      animationEnCours =
        false;

    });

    if(pageActuelle === pagesCarnet.length - 1){

      /*
        finE.png reste affichée aussi longtemps que nécessaire.
        Le prochain clic sur le carnet lancera seulement alors
        la vidéo et le dernier jeu interactif.
      */

      attenteClicApresFinE = true;

      carnetZone.style.cursor =
        "pointer";

      carnetZone.setAttribute(
        "title",
        "Clique pour continuer"
      );

      carnetZone.setAttribute(
        "aria-label",
        "Lire la dernière page puis cliquer pour continuer"
      );

    }

  }, dureeTotale + 80);

}



/* ======================================================
   SÉQUENCE FINALE : VIDÉO PUIS TROIS CHAMPS
====================================================== */

function lancerSequenceFinale(){

  if(sequenceFinaleLancee){
    return;
  }

  sequenceFinaleLancee = true;

  pageCarnetActuelle.classList.remove(
    "visible"
  );

  reponsesFinales.classList.remove(
    "visible"
  );

  reponsesFinales.setAttribute(
    "aria-hidden",
    "true"
  );

  videoJeuFinal.classList.add(
    "visible"
  );

  boutonLireVideo.classList.remove(
    "visible"
  );

  videoJeuFinal.currentTime = 0;
  videoJeuFinal.muted = false;
  videoJeuFinal.volume = 1;

  const tentativeLecture =
    videoJeuFinal.play();

  if(
    tentativeLecture &&
    typeof tentativeLecture.catch === "function"
  ){

    tentativeLecture.catch(function(){

      boutonLireVideo.classList.add(
        "visible"
      );

    });

  }

}

boutonLireVideo.addEventListener(
  "click",
  function(event){

    event.stopPropagation();

    boutonLireVideo.classList.remove(
      "visible"
    );

    videoJeuFinal.play();

  }
);

videoJeuFinal.addEventListener(
  "click",
  function(event){

    event.stopPropagation();

    if(videoJeuFinal.paused){
      videoJeuFinal.play();
    }

  }
);

videoJeuFinal.addEventListener(
  "ended",
  afficherReponsesFinales
);

function afficherReponsesFinales(){

  boutonLireVideo.classList.remove(
    "visible"
  );

  /*
    La vidéo reste affichée sur sa dernière image.
    On la met simplement en pause et on désactive ses clics
    pour que les champs placés au-dessus restent accessibles.
  */

  videoJeuFinal.pause();
  videoJeuFinal.classList.add(
    "visible"
  );
  videoJeuFinal.style.pointerEvents =
    "none";

  reponsesFinales.classList.add(
    "visible"
  );

  reponsesFinales.setAttribute(
    "aria-hidden",
    "false"
  );

  carnetZone.setAttribute(
    "aria-label",
    "Saisir les trois mots cachés"
  );

  window.setTimeout(function(){
    champsMorse[0].focus();
  }, 80);

}

const reponsesAttendues = [
  "ECOUTER",
  "CROIRE",
  "PROTEGER"
];

const reponsesAffichees = [
  "ÉCOUTER",
  "CROIRE",
  "PROTÉGER"
];

champsMorse.forEach(function(champ, index){

  champ.addEventListener(
    "click",
    function(event){
      event.stopPropagation();
    }
  );

  champ.addEventListener(
    "keydown",
    function(event){

      event.stopPropagation();

      if(event.key === "Enter"){

        event.preventDefault();
        verifierChampMorse(champ, index, true);

      }

    }
  );

  champ.addEventListener(
    "input",
    function(){
      verifierChampMorse(champ, index, false);
    }
  );

  champ.addEventListener(
    "blur",
    function(){
      verifierChampMorse(champ, index, true);
    }
  );

});

function normaliserMot(texte){

  return String(texte || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Za-z]/g, "")
    .toUpperCase();

}

function verifierChampMorse(champ, index, signalerErreur){

  const valeur =
    normaliserMot(champ.value);

  const reponse =
    reponsesAttendues[index];

  champ.classList.remove(
    "correct",
    "erreur"
  );

  if(valeur === reponse){

    champ.classList.add(
      "correct"
    );

    champ.value = reponsesAffichees[index];

    if(index < champsMorse.length - 1){
      champsMorse[index + 1].focus();
    }

  }
  else if(
    signalerErreur &&
    valeur.length > 0
  ){

    champ.classList.add(
      "erreur"
    );

  }

  verifierEnigmeFinale();

}

function verifierEnigmeFinale(){

  if(enigmeFinaleValidee){
    return;
  }

  const toutesCorrectes =
    champsMorse.every(function(champ, index){

      return normaliserMot(champ.value) ===
        reponsesAttendues[index];

    });

  if(!toutesCorrectes){
    return;
  }

  enigmeFinaleValidee = true;

  champsMorse.forEach(function(champ){

    champ.classList.remove(
      "erreur"
    );

    champ.classList.add(
      "correct"
    );

    champ.readOnly = true;

  });

  ajouterMotFinalAuSac();

  /*
    Le Bravi final n'apparaît qu'une fois les trois réponses correctes.
  */

  if(messageReussite){
    messageReussite.classList.remove(
      "visible"
    );
  }

  blocFin.classList.add(
    "gagnee"
  );

  braviFinal.classList.add(
    "visible"
  );

  braviFinal.setAttribute(
    "aria-hidden",
    "false"
  );

}

function ajouterMotFinalAuSac(){

  let mots = [];

  try{

    mots =
      JSON.parse(
        localStorage.getItem("motsEscapeRebond")
      ) || [];

  }
  catch(erreur){

    mots = [];

  }

  const dejaPresent =
    mots.some(function(item){

      if(
        typeof item === "object" &&
        item !== null
      ){

        return normaliserMot(item.mot) ===
          "LESPORT";

      }

      return normaliserMot(item) ===
        "LESPORT";

    });

  if(!dejaPresent){

    mots.push({
      enigme:"Énigme finale",
      mot:"LE SPORT"
    });

    localStorage.setItem(
      "motsEscapeRebond",
      JSON.stringify(mots)
    );

  }

  afficherMotsTrouves();

}

/* ======================================================
   INVENTAIRE
====================================================== */

afficherMotsTrouves();

function afficherMotsTrouves(){

  const liste =
    document.getElementById("listeMots");

  if(!liste){
    return;
  }

  let mots = [];

  try{

    mots =
      JSON.parse(
        localStorage.getItem("motsEscapeRebond")
      ) || [];

  }
  catch(erreur){

    mots = [];

  }

  liste.innerHTML = "";

  if(mots.length === 0){

    const li =
      document.createElement("li");

    li.textContent =
      "Aucun mot";

    liste.appendChild(li);

    return;
  }

  mots.forEach(function(item){

    const li =
      document.createElement("li");

    if(
      typeof item === "object" &&
      item !== null &&
      item.enigme &&
      item.mot
    ){

      li.textContent =
        item.enigme + " : " + item.mot;

    }
    else{

      li.textContent =
        String(item);

    }

    liste.appendChild(li);

  });

}
</script>
