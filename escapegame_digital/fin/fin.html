<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Game Rebond - Révélation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#1b5f6e;
  font-family:Arial, Helvetica, sans-serif;
}

.page-fin{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:40px;
}

.bloc-fin{
  position:relative;
  width:999px;
  height:716px;
  line-height:0;
  font-size:0;
}

.animation-fin{
  display:block;
  width:999px;
  height:716px;
  border:0;
}

/* ======================================================
   ZONE DU CARNET
====================================================== */

.carnet-zone{
  position:absolute;
  left:304px;
  top:183px;
  width:635px;
  height:479px;

  overflow:visible;
  cursor:pointer;
  z-index:100;

  perspective:1900px;
  perspective-origin:50% 50%;
  transform-style:preserve-3d;

  background:transparent;
  outline:none;
}

.carnet-zone:focus-visible{
  outline:3px solid rgba(255,255,255,.85);
  outline-offset:3px;
}

/* ======================================================
   PAGE FIXE ACTUELLE
====================================================== */

.page-carnet-actuelle{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  display:block;
  object-fit:fill;

  opacity:0;
  pointer-events:none;

  z-index:5;
}

.page-carnet-actuelle.visible{
  opacity:1;
}

/* ======================================================
   NOUVELLE PAGE RÉVÉLÉE PROGRESSIVEMENT
====================================================== */

.page-suivante{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  z-index:10;
  pointer-events:none;

  opacity:0;
}

.page-suivante.visible{
  opacity:1;
}

/*
  Les deux moitiés utilisent la même image complète.
  Chaque moitié masque simplement la partie opposée.
*/

.revelation-gauche,
.revelation-droite{
  position:absolute;
  top:0;

  width:50%;
  height:100%;

  overflow:hidden;
  pointer-events:none;
}

.revelation-gauche{
  left:0;
}

.revelation-droite{
  left:50%;
}

.revelation-gauche img,
.revelation-droite img{
  position:absolute;
  top:0;

  width:200%;
  height:100%;
  max-width:none;

  display:block;
  object-fit:fill;

  user-select:none;
  pointer-events:none;

  filter:none;
  box-shadow:none;
}

/* Image complète alignée dans la moitié gauche */

.revelation-gauche img{
  left:0;
}

/* Image complète décalée pour afficher sa moitié droite */

.revelation-droite img{
  right:0;
}

/*
  La nouvelle page droite apparaît assez tôt,
  comme si elle se trouvait déjà sous le paquet.
*/

.revelation-droite{
  clip-path:inset(0 100% 0 0);
  opacity:0;
}

.revelation-droite.en-cours{
  animation:
    revelerPageDroite var(--duree-droite) ease-out forwards;
}

/*
  La nouvelle page gauche apparaît plus tard,
  au fur et à mesure que les versos se posent à gauche.
*/

.revelation-gauche{
  clip-path:inset(0 0 0 100%);
  opacity:0;
}

.revelation-gauche.en-cours{
  animation:
    revelerPageGauche var(--duree-gauche) ease-in-out
    var(--retard-gauche) forwards;
}

@keyframes revelerPageDroite{

  0%{
    clip-path:inset(0 100% 0 0);
    opacity:0;
  }

  18%{
    opacity:.22;
  }

  55%{
    clip-path:inset(0 30% 0 0);
    opacity:.78;
  }

  100%{
    clip-path:inset(0 0 0 0);
    opacity:1;
  }
}

@keyframes revelerPageGauche{

  0%{
    clip-path:inset(0 0 0 100%);
    opacity:0;
  }

  12%{
    opacity:.12;
  }

  45%{
    clip-path:inset(0 0 0 55%);
    opacity:.55;
  }

  75%{
    clip-path:inset(0 0 0 18%);
    opacity:.88;
  }

  100%{
    clip-path:inset(0 0 0 0);
    opacity:1;
  }
}

/* ======================================================
   PAQUET DE FEUILLES
====================================================== */

.paquet-pages{
  position:absolute;
  inset:0;

  z-index:50;
  pointer-events:none;

  overflow:visible;
  transform-style:preserve-3d;
}

.feuille{
  position:absolute;
  top:0;
  left:50%;

  width:50%;
  height:100%;

  opacity:0;

  transform-origin:left center;
  transform-style:preserve-3d;

  overflow:visible;
  pointer-events:none;
}

/* Recto et verso */

.face-feuille,
.verso-feuille{
  position:absolute;
  inset:0;

  overflow:visible;

  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;

  background:transparent;
}

.face-feuille img,
.verso-feuille img{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  display:block;
  object-fit:fill;

  pointer-events:none;
  user-select:none;

  filter:none;
  box-shadow:none;
}

.verso-feuille{
  transform:rotateY(180deg);
}

/* ======================================================
   ANIMATION DES FEUILLES
====================================================== */

.feuille.active{
  opacity:1;

  animation:
    tournerFeuille 1.05s cubic-bezier(.48,.02,.18,1) forwards;
}

@keyframes tournerFeuille{

  0%{
    transform:
      rotateY(0deg)
      rotateZ(0deg)
      skewY(0deg)
      scaleX(1)
      scaleY(1)
      translateY(0)
      translateZ(0);
  }

  14%{
    transform:
      rotateY(-16deg)
      rotateZ(-.4deg)
      skewY(-.5deg)
      scaleX(.99)
      scaleY(1.015)
      translateY(-3px)
      translateZ(5px);
  }

  32%{
    transform:
      rotateY(-50deg)
      rotateZ(-1deg)
      skewY(-1.5deg)
      scaleX(.95)
      scaleY(1.04)
      translateY(-8px)
      translateZ(13px);
  }

  52%{
    transform:
      rotateY(-92deg)
      rotateZ(-1.5deg)
      skewY(-2.5deg)
      scaleX(.88)
      scaleY(1.075)
      translateY(-17px)
      translateZ(25px);
  }

  72%{
    transform:
      rotateY(-138deg)
      rotateZ(-.8deg)
      skewY(-1.2deg)
      scaleX(.95)
      scaleY(1.045)
      translateY(-10px)
      translateZ(14px);
  }

  91%{
    transform:
      rotateY(-172deg)
      rotateZ(-.2deg)
      skewY(-.3deg)
      scaleX(.99)
      scaleY(1.015)
      translateY(-3px)
      translateZ(4px);
  }

  100%{
    transform:
      rotateY(-180deg)
      rotateZ(0deg)
      skewY(0deg)
      scaleX(1)
      scaleY(1)
      translateY(0)
      translateZ(0);
  }
}

/* ======================================================
   SAC INVENTAIRE
====================================================== */

.inventaire{
  position:absolute;
  left:-70px;
  top:0;
  height:716px;
  z-index:3000;
}

.inventaire-tab{
  position:absolute;
  left:0;
  top:25px;

  width:70px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;
}

.inventaire-tab img{
  width:80px;
  height:auto;

  display:block;
  pointer-events:none;

  transition:transform .25s;

  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.inventaire:hover .inventaire-tab img{
  transform:scale(1.08);
}

.inventaire-content{
  position:absolute;
  left:70px;
  top:10px;

  width:0;
  height:200px;

  overflow:hidden;

  background:rgba(255,255,255,.30);

  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);

  color:#044e61;

  transition:width .35s ease;

  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.inventaire:hover .inventaire-content{
  width:230px;
}

.inventaire-content-inner{
  width:230px;
  height:200px;

  padding:25px 18px;

  overflow-y:auto;

  line-height:1.3;
}

.inventaire-content h3,
.navigation-content h3{
  font-size:18px;
  line-height:22px;
  margin-bottom:18px;
  color:#044e61;
}

.inventaire-content ul{
  list-style:none;
}

.inventaire-content li{
  display:block;

  line-height:18px;

  margin-bottom:10px;
  padding:10px;

  border-radius:10px;

  background:rgba(255,255,255,.55);

  color:#044e61;

  font-weight:bold;
  font-size:14px;
}

/* ======================================================
   LOUPE
====================================================== */

.navigation-enigmes{
  position:absolute;
  left:-70px;
  top:90px;

  height:716px;

  z-index:2990;
}

.navigation-tab{
  position:absolute;
  left:0;
  top:25px;

  width:70px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;
}

.navigation-tab img{
  width:80px;
  height:auto;

  display:block;
  pointer-events:none;

  transition:transform .25s;

  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
}

.navigation-enigmes:hover .navigation-tab img{
  transform:scale(1.08);
}

.navigation-content{
  position:absolute;
  left:70px;
  top:10px;

  width:0;

  overflow:hidden;

  background:rgba(255,255,255,.30);

  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);

  color:#044e61;

  transition:width .35s ease;

  border-radius:0 18px 18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.navigation-enigmes:hover .navigation-content{
  width:230px;
}

.navigation-content-inner{
  width:230px;

  padding:22px 18px 16px;

  overflow:visible;

  line-height:1.3;
}

.navigation-content a{
  display:block;

  line-height:18px;

  margin-bottom:8px;
  padding:9px 10px;

  border-radius:10px;

  background:rgba(255,255,255,.55);

  color:#044e61;

  font-weight:bold;
  font-size:14px;
  text-decoration:none;
}

.navigation-content a:last-child{
  margin-bottom:0;
}

.navigation-content a:hover{
  background:#044e61;
  color:#ffffff;
}

/* ======================================================
   ÉCRANS PLUS PETITS
====================================================== */

@media screen and (max-width:1140px){

  .page-fin{
    align-items:flex-start;
    padding-left:85px;
  }

}
</style>
</head>

<body>

<div class="page-fin">

  <div class="bloc-fin">

    <!-- SAC -->

    <div class="inventaire" id="inventaire">

      <div class="inventaire-tab">

        <img
          src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/sac.png"
          alt="Inventaire">

      </div>

      <div class="inventaire-content">

        <div class="inventaire-content-inner">

          <h3>Mots trouvés</h3>

          <ul id="listeMots"></ul>

        </div>

      </div>

    </div>

    <!-- LOUPE -->

    <div class="navigation-enigmes" id="navigationEnigmes">

      <div class="navigation-tab">

        <img
          src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/loupe.png"
          alt="Énigmes">

      </div>

      <div class="navigation-content">

        <div class="navigation-content-inner">

          <h3>Énigmes</h3>

          <a href="../enigme1.html">Énigme 1</a>
          <a href="../enigme2.html">Énigme 2</a>
          <a href="../enigme3.html">Énigme 3</a>
          <a href="../enigme4.html">Énigme 4</a>
          <a href="../enigme5.html">Énigme 5</a>

        </div>

      </div>

    </div>

    <!-- VIDÉO DE FOND -->

    <video
      id="videoFin"
      class="animation-fin"
      src="https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/animationfin1.mp4"
      autoplay
      muted
      playsinline
      preload="auto">
    </video>

    <!-- ZONE DU CARNET -->

    <div
      class="carnet-zone"
      id="carnetZone"
      role="button"
      tabindex="0"
      title="Clique pour tourner les pages"
      aria-label="Tourner les pages du carnet">

      <!-- Page actuellement installée -->

      <img
        class="page-carnet-actuelle"
        id="pageCarnetActuelle"
        src=""
        alt="Double page du carnet">

      <!-- Nouvelle double page révélée progressivement -->

      <div
        class="page-suivante"
        id="pageSuivante">

        <div
          class="revelation-gauche"
          id="revelationGauche">

          <img
            id="imageSuivanteGauche"
            src=""
            alt="">

        </div>

        <div
          class="revelation-droite"
          id="revelationDroite">

          <img
            id="imageSuivanteDroite"
            src=""
            alt="">

        </div>

      </div>

      <!-- Feuilles tournantes -->

      <div
        class="paquet-pages"
        id="paquetPages">
      </div>

    </div>

  </div>

</div>

<script>
const videoFin =
  document.getElementById("videoFin");

const carnetZone =
  document.getElementById("carnetZone");

const pageCarnetActuelle =
  document.getElementById("pageCarnetActuelle");

const pageSuivante =
  document.getElementById("pageSuivante");

const revelationGauche =
  document.getElementById("revelationGauche");

const revelationDroite =
  document.getElementById("revelationDroite");

const imageSuivanteGauche =
  document.getElementById("imageSuivanteGauche");

const imageSuivanteDroite =
  document.getElementById("imageSuivanteDroite");

const paquetPages =
  document.getElementById("paquetPages");

/* ======================================================
   IMAGES
====================================================== */

const pagesCarnet = [
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finA.png",
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finB.png",
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finC.png",
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finD.png",
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/finE.png"
];

const imageRecto =
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/droite.png";

const imageVerso =
  "https://avantpost-cpu.github.io/depot-quiz/escapegame_digital/fin/gauche.png";

/* ======================================================
   RÉGLAGES DU FEUILLETAGE
====================================================== */

const nombreDeFeuilles = 7;
const decalageFeuilles = 68;
const dureeRotation = 1050;

const dureeTotale =
  dureeRotation +
  ((nombreDeFeuilles - 1) * decalageFeuilles);

/*
  La moitié droite commence immédiatement.

  La moitié gauche commence lorsque plusieurs versos
  sont déjà arrivés du côté gauche.
*/

const dureeRevelationDroite =
  Math.round(dureeTotale * .68);

const retardRevelationGauche =
  Math.round(dureeTotale * .28);

const dureeRevelationGauche =
  Math.round(dureeTotale * .72);

document.documentElement.style.setProperty(
  "--duree-droite",
  dureeRevelationDroite + "ms"
);

document.documentElement.style.setProperty(
  "--retard-gauche",
  retardRevelationGauche + "ms"
);

document.documentElement.style.setProperty(
  "--duree-gauche",
  dureeRevelationGauche + "ms"
);

let pageActuelle = -1;
let animationEnCours = false;

/* ======================================================
   PRÉCHARGEMENT
====================================================== */

[
  ...pagesCarnet,
  imageRecto,
  imageVerso
].forEach(function(adresse){

  const image = new Image();
  image.src = adresse;

});

/* ======================================================
   CRÉATION DES FEUILLES
====================================================== */

function creerPaquetPages(){

  paquetPages.innerHTML = "";

  for(let i = 0; i < nombreDeFeuilles; i++){

    const feuille =
      document.createElement("div");

    feuille.className =
      "feuille";

    feuille.style.zIndex =
      String(nombreDeFeuilles - i);

    /* RECTO */

    const face =
      document.createElement("div");

    face.className =
      "face-feuille";

    const recto =
      document.createElement("img");

    recto.src =
      imageRecto;

    recto.alt = "";
    recto.draggable = false;

    face.appendChild(recto);

    /* VERSO */

    const verso =
      document.createElement("div");

    verso.className =
      "verso-feuille";

    const imageDos =
      document.createElement("img");

    imageDos.src =
      imageVerso;

    imageDos.alt = "";
    imageDos.draggable = false;

    verso.appendChild(imageDos);

    feuille.appendChild(face);
    feuille.appendChild(verso);

    paquetPages.appendChild(feuille);

  }

}

creerPaquetPages();

/* ======================================================
   LECTURE VIDÉO
====================================================== */

videoFin.play().catch(function(){

  document.addEventListener(
    "click",
    function lancerVideo(){

      videoFin.play();

    },
    {
      once:true
    }
  );

});

/* ======================================================
   INTERACTIONS
====================================================== */

carnetZone.addEventListener(
  "click",
  tournerPages
);

carnetZone.addEventListener(
  "keydown",
  function(event){

    if(
      event.key === "Enter" ||
      event.key === " "
    ){

      event.preventDefault();
      tournerPages();

    }

  }
);

/* ======================================================
   TOURNER LES PAGES
====================================================== */

function tournerPages(){

  if(animationEnCours){
    return;
  }

  if(pageActuelle >= pagesCarnet.length - 1){

    carnetZone.style.cursor =
      "default";

    carnetZone.removeAttribute(
      "title"
    );

    return;
  }

  animationEnCours = true;

  const indexSuivant =
    pageActuelle + 1;

  const nouvelleImage =
    pagesCarnet[indexSuivant];

  const feuilles =
    paquetPages.querySelectorAll(".feuille");

  /*
    Préparation immédiate de la nouvelle double page.
  */

  imageSuivanteGauche.src =
    nouvelleImage;

  imageSuivanteDroite.src =
    nouvelleImage;

  pageSuivante.classList.add(
    "visible"
  );

  /*
    Réinitialisation des animations de révélation.
  */

  revelationGauche.classList.remove(
    "en-cours"
  );

  revelationDroite.classList.remove(
    "en-cours"
  );

  feuilles.forEach(function(feuille){

    feuille.classList.remove(
      "active"
    );

    feuille.style.animationDelay =
      "0ms";

  });

  void pageSuivante.offsetWidth;
  void paquetPages.offsetWidth;

  /*
    Révélation progressive de la page fixe.
  */

  revelationDroite.classList.add(
    "en-cours"
  );

  revelationGauche.classList.add(
    "en-cours"
  );

  /*
    Feuilletage.
  */

  feuilles.forEach(function(feuille, index){

    feuille.style.animationDelay =
      (index * decalageFeuilles) + "ms";

    feuille.classList.add(
      "active"
    );

  });

  /*
    Fin de la transition.
  */

  window.setTimeout(function(){

    /*
      La nouvelle image devient la page fixe officielle.

      Visuellement, elle est déjà entièrement présente :
      ce remplacement est donc invisible.
    */

    pageCarnetActuelle.src =
      nouvelleImage;

    pageCarnetActuelle.classList.add(
      "visible"
    );

    pageActuelle =
      indexSuivant;

    /*
      Retrait des éléments temporaires.
    */

    window.requestAnimationFrame(function(){

      feuilles.forEach(function(feuille){

        feuille.classList.remove(
          "active"
        );

        feuille.style.animationDelay =
          "0ms";

      });

      revelationGauche.classList.remove(
        "en-cours"
      );

      revelationDroite.classList.remove(
        "en-cours"
      );

      pageSuivante.classList.remove(
        "visible"
      );

      animationEnCours =
        false;

    });

    if(pageActuelle === pagesCarnet.length - 1){

      carnetZone.style.cursor =
        "default";

      carnetZone.removeAttribute(
        "title"
      );

      carnetZone.setAttribute(
        "aria-label",
        "Dernière page du carnet"
      );

    }

  }, dureeTotale + 80);

}

/* ======================================================
   INVENTAIRE
====================================================== */

afficherMotsTrouves();

function afficherMotsTrouves(){

  const liste =
    document.getElementById("listeMots");

  if(!liste){
    return;
  }

  let mots = [];

  try{

    mots =
      JSON.parse(
        localStorage.getItem("motsEscapeRebond")
      ) || [];

  }
  catch(erreur){

    mots = [];

  }

  liste.innerHTML = "";

  if(mots.length === 0){

    const li =
      document.createElement("li");

    li.textContent =
      "Aucun mot";

    liste.appendChild(li);

    return;
  }

  mots.forEach(function(item){

    const li =
      document.createElement("li");

    if(
      typeof item === "object" &&
      item !== null &&
      item.enigme &&
      item.mot
    ){

      li.textContent =
        item.enigme + " : " + item.mot;

    }
    else{

      li.textContent =
        String(item);

    }

    liste.appendChild(li);

  });

}
</script>

</body>
</html>
